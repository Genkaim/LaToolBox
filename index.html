function polyInputHTML(id,maxDeg){
  let html=`<div id="${id}-wrap">`;
  html+=`<div class="dim-row"><span class="dim-label">次数</span>
    <select class="dim-select" id="${id}-deg" onchange="rebuildPolyInput('${id}')">
    ${[1,2,3,4,5,6].map(v=>`<option value="${v}"${v===maxDeg?' selected':''}>${v}</option>`).join('')}
    </select></div>`;
  html+=`<div id="${id}-coeffs-area">${polyCoeffsHTML(id,maxDeg)}</div>`;
  html+=`<div id="${id}-display" class="poly-display" style="margin-top:8px;font-size:.85rem;color:var(--text2)">f(x) = ?</div>`;
  html+='</div>';
  return html;
}

function polyCoeffsHTML(id,deg){
  let html='<div class="poly-input-row">';
  for(let i=0;i<=deg;i++){
    const pow=deg-i;
    const label=pow===0?'':pow===1?'x':`x<sup>${pow}</sup>`;
    html+=`<input type="text" class="poly-coeff" id="${id}_c${i}" 
      value="${i===0?1:0}" inputmode="none"
      onfocus="onCellFocus(this)"
      onblur="updatePolyDisplay('${id}')"
      onchange="updatePolyDisplay('${id}')">
    <span class="poly-term-label">${label}${i<deg?' +':''}</span>`;
  }
  html+='</div>';
  return html;
}

function rebuildPolyInput(id){
  const deg=parseInt(document.getElementById(`${id}-deg`).value);
  document.getElementById(`${id}-coeffs-area`).innerHTML=polyCoeffsHTML(id,deg);
  updatePolyDisplay(id);
  setupNumpadListeners();
}

function updatePolyDisplay(id){
  const deg=parseInt(document.getElementById(`${id}-deg`).value);
  const coeffs=getPolyCoeffs(id,deg);
  const p=new Poly(coeffs);
  const disp=document.getElementById(`${id}-display`);
  if(disp)disp.innerHTML=`f(x) = ${p.toHTML()}`;
}

function scrollToTop(){
  const el=document.getElementById('main');
  el.scrollTo?el.scrollTo({top:0,behavior:'smooth'}):(el.scrollTop=0);
  window.scrollTo&&window.scrollTo({top:0,behavior:'smooth'});
}

const BOTTOM_BAR=`
  <div class="tool-bottom-bar">
    <button class="btn-back-top" onclick="scrollToTop()">↑ 回到顶部</button>
    <button class="btn-to-hub" onclick="showHub()">⊞ 工具聚合页</button>
  </div>`;

function showResults(stepsHTML,resultHTML=''){
  hideNumpad();
  const html=`
    ${resultHTML?`<div class="result-block"><div class="result-title">计算结果</div>${resultHTML}</div>`:''}
    <div class="result-block">
      <div class="result-title">解题步骤</div>
      <div class="steps-container">${stepsHTML}</div>
    </div>
    ${BOTTOM_BAR}
  `;
  document.getElementById('results').innerHTML=html;
  document.getElementById('main').scrollTo&&document.getElementById('main').scrollTo({top:document.getElementById('results').offsetTop,behavior:'smooth'});
  addToHistory(activeTool,resultHTML,stepsHTML);
}

function computeDet(){
  const{rows}=getDim('det');
  const M=getMatrixValue('det',rows,rows);
  const{steps,value,err}=determinant(M);
  if(err){showResults(`<div class="info-box error">${err}</div>`);return;}
  const stepsHTML=steps.join('\n');
  const resultHTML=`<div class="result-value">det(A) = ${value.toHTML()}</div>`;
  saveAns(value);
  showResults(stepsHTML,resultHTML);
}

function computeInverse(){
  const{rows}=getDim('inv');
  const M=getMatrixValue('inv',rows,rows);
  const{steps,result,err}=matInverse(M);
  if(err){
    showResults([`<div class="info-box error">${err}</div>`,...(steps||[])].join(''));
    return;
  }
  saveAns(result);
  showResults(steps.join('\n'),`<div style="font-size:.85rem;color:var(--text2);margin-bottom:6px">A⁻¹ = </div>${dispMatrix(result)}`);
}

function computeRank(){
  const{rows,cols}=getDim('rank');
  const M=getMatrixValue('rank',rows,cols);
  const{result,steps,pivots}=gaussianElim(M,true);
  const r=pivots.length;
  saveAns(F(r));
  showResults(steps.join('\n'),`<div class="result-value">rank(A) = ${r}</div>`);
}

function computeRef(){
  const{rows,cols}=getDim('ref');
  const M=getMatrixValue('ref',rows,cols);
  const{result,steps}=gaussianElim(M,true);
  saveAns(result);
  showResults(steps.join('\n'),`<div style="font-size:.85rem;color:var(--text2);margin-bottom:6px">行阶梯形：</div>${dispMatrix(result)}`);
}

  showResults(steps.join('\n'),`<div style="font-size:.85rem;color:var(--text2);margin-bottom:6px">最简行阶梯形：</div>${dispMatrix(result,pivots)}`);

  const{rows,cols}=getDim('hom');
  const A=getMatrixValue('hom',rows,cols);
  const b=Array(rows).fill(F(0));
  const{steps,solution}=solveLinearSystem(A,b,true);
  showResults(steps.join('\n'));
}

function computeMatAdd(){
  const{rows,cols}=getDim('madd');
  const A=getMatrixValue('maddA',rows,cols);
  const B=getMatrixValue('maddB',rows,cols);
  const steps=[];
  let stepIdx=1;
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>A ${maddOp==='add'?'+':'−'} B 逐元素${maddOp==='add'?'相加':'相减'}</span>`,
    `<div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px">
     ${dispMatrix(A)}
     <span style="font-size:1.3rem;color:var(--accent)">${maddOp==='add'?'+':'−'}</span>
     ${dispMatrix(B)}</div>`
  ));
  const C=maddOp==='add'?matAdd(A,B):matSub(A,B);
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>结果矩阵 C = A ${maddOp==='add'?'+':'−'} B</span>`,
    dispMatrix(C)
  ));
  saveAns(C);
  showResults(steps.join('\n'),`${dispMatrix(C)}`);
}

function computeMatMul(){
  const rA=parseInt(document.getElementById('mmulA-rows').value)||3;
  const cA=parseInt(document.getElementById('mmulA-cols').value)||3;
  const cB=parseInt(document.getElementById('mmulB-cols').value)||3;
  const A=getMatrixValue('mmulA',rA,cA);
  const B=getMatrixValue('mmulB',cA,cB);
  const steps=[];
  let stepIdx=1;
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>矩阵 A (${rA}×${cA}) × 矩阵 B (${cA}×${cB})</span>`,
    `<div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px">
     ${dispMatrix(A)} <span style="font-size:1.3rem;color:var(--accent)">×</span> ${dispMatrix(B)}</div>`
  ));
  // Show element computation for small matrices
  const C=matMul(A,B);
  if(rA<=4&&cA<=4&&cB<=4){
    for(let i=0;i<rA;i++){
      for(let j=0;j<cB;j++){
        let formula=`C[${i+1},${j+1}] = `;
        const terms=Array.from({length:cA},(_,k)=>`(${A[i][k].toStr()})(${B[k][j].toStr()})`);
        formula+=terms.join(' + ');
        formula+=` = ${C[i][j].toHTML()}`;
        steps.push(step(
          `${makeStepNum(stepIdx++)}<span>计算 C<sub>${i+1},${j+1}</sub></span>`,
          `<div class="eq-display">${formula}</div>`
        ));
      }
    }
  }
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>结果矩阵 C = AB</span>`,
    dispMatrix(C)
  ));
  saveAns(C);
  showResults(steps.join('\n'),`${dispMatrix(C)}`);
}

function computeScalarMul(){
  const{rows,cols}=getDim('smul');
  const kEl=document.getElementById('smul-k');
  const k=parseCell(kEl?kEl.value:'2');
  const A=getMatrixValue('smul',rows,cols);
  const steps=[];
  let stepIdx=1;
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>数乘：k × A，每个元素乘以 k = ${k.toHTML()}</span>`,
    `<div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px">
     <span style="font-size:1.1rem;color:var(--accent)">${k.toHTML()} ×</span>${dispMatrix(A)}</div>`
  ));
  const C=scalarMul(k,A);
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>结果 kA</span>`,
    dispMatrix(C)
  ));
  saveAns(C);
  showResults(steps.join('\n'),`${dispMatrix(C)}`);
}

function computeEigen(){
  const{rows}=getDim('eigen');
  const A=getMatrixValue('eigen',rows,rows);
  const Af=A.map(r=>r.map(v=>v.toFloat()));
  const steps=[];
  let stepIdx=1;
  
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>待求矩阵 A</span>`,
    dispMatrix(A)
  ));
  
  const eigenvals=findEigenvalues(A);
  const unique=[];
  eigenvals.forEach(e=>{
    if(!unique.some(u=>Math.abs(u-e)<1e-6))unique.push(e);
  });
  unique.sort((a,b)=>a-b);
  
  // Characteristic polynomial
  let charPolyStr='';
  if(rows===2){
    const tr=Af[0][0]+Af[1][1];
    const d=Af[0][0]*Af[1][1]-Af[0][1]*Af[1][0];
    charPolyStr=`λ² − ${fmtFloatStr(tr)}λ + (${fmtFloatStr(d)}) = 0`;
  }else if(rows===3){
    const tr=Af[0][0]+Af[1][1]+Af[2][2];
    const det3=detFloat(Af);
    charPolyStr=`λ³ − ${fmtFloatStr(tr)}λ² + ··· + (${fmtFloatStr(-det3)}) = 0`;
  }else{
    charPolyStr=`det(λI − A) = 0`;
  }
  
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>特征方程 det(λI − A) = 0</span>`,
    `<div class="eq-display"><span style="color:var(--accent)">${charPolyStr}</span></div>
     <div style="margin-top:6px;font-size:.82rem;color:var(--text2)">特征值（特征多项式的根）：</div>
     <div class="eq-display" style="margin-top:4px">${unique.map(e=>`<span style="color:var(--accent)">λ = ${fmtFloat(e)}</span>`).join('，')}</div>`
  ));
  
  unique.forEach(lambda=>{
    const am=eigenvals.filter(v=>Math.abs(v-lambda)<1e-6).length;
    const vecs=nullSpaceFloat(Af,lambda);
    
    // Show (λI-A)
    const LIA=Af.map((r,i)=>r.map((v,j)=>(i===j?lambda:0)-v));
    const LIAf=matFromFloat(LIA);
    
    steps.push(step(
      `${makeStepNum(stepIdx++)}<span>λ = ${fmtFloat(lambda)}（重数 ${am}）：解 (λI−A)x = 0</span>`,
      dispMatrix(LIAf)
    ));
    
    const{result,steps:rrefSteps,pivots}=rref(appendRight(LIAf,LIAf.map(()=>LIAf[0].map(()=>F(0)))),true);
    // Just show simplified
    const nullVecsF=vecs.map(v=>matFromFloat(v.map(e=>[e])));
    steps.push(step(
      `${makeStepNum(stepIdx++)}<span>λ = ${fmtFloat(lambda)} 的特征向量（基础解系）</span>`,
      `<div style="display:flex;flex-wrap:wrap;gap:12px">
       ${vecs.map((v,i)=>`<div style="display:flex;align-items:center;gap:4px">
         <span style="color:var(--purple)">ξ<sub>${i+1}</sub> = </span>
         ${dispMatrix(nullVecsF[i])}
       </div>`).join('')}
       </div>`
    ));
  });
  
  showResults(steps.join('\n'));
}

function computeDiag(){
  const{rows}=getDim('diag');
  const A=getMatrixValue('diag',rows,rows);
  const{steps}=diagonalize(A);
  showResults(steps.join('\n'));
}

function computePinvap(){
  const{rows}=getDim('pinv');
  const P=getMatrixValue('pinvP',rows,rows);
  const A=getMatrixValue('pinvA',rows,rows);
  const{steps,result,err}=computePinvAP(P,A);

  saveAns(result);
  showResults(steps.join('\n'),`<div style="font-size:.85rem;color:var(--text2);margin-bottom:6px">P⁻¹AP = </div>${dispMatrix(result)}`);
}

function computeTrans(){
  const n=parseInt(document.getElementById('trans-rows').value)||3;
  const B1=getMatrixValue('transB1',n,n);
  const B2=getMatrixValue('transB2',n,n);
  const{steps,result,err}=transitionMatrix(B1,B2);
  if(err){showResults(steps.join('\n')+`<div class="info-box error">${err}</div>`);return;}
  saveAns(result);
  showResults(steps.join('\n'),`<div style="font-size:.85rem;color:var(--text2);margin-bottom:6px">过渡矩阵 P = B₁⁻¹B₂ = </div>${dispMatrix(result)}`);
}

function computeQf(){
  const{rows}=getDim('qf');
  let A=getMatrixValue('qf',rows,rows);
  // Symmetrize: use upper triangle
  for(let i=0;i<rows;i++)for(let j=0;j<rows;j++)if(i!==j)A[j][i]=A[i][j];
  
  let{steps}={steps:[]};
  if(qfMethod==='cs') ({steps}=qfCompletingSquare(A));
  else if(qfMethod==='cg') ({steps}=qfCongruence(A));
  else ({steps}=qfOrthogonal(A));
  
  showResults(steps.join('\n'));
}

function computePolydiv(){
  const degF=parseInt(document.getElementById('pdiv-f-deg').value);
  const degG=parseInt(document.getElementById('pdiv-g-deg').value);
  const fCoeffs=getPolyCoeffs('pdiv-f',degF);
  const gCoeffs=getPolyCoeffs('pdiv-g',degG);
  const f=new Poly(fCoeffs);
  const g=new Poly(gCoeffs);
  if(g.isZero()){showResults(`<div class="info-box error">除式不能为零多项式</div>`);return;}
  const{quotient,remainder,steps}=polyDiv(f,g);
  showResults(steps.join('\n'));
}

function computePolygcd(){
  const degF=parseInt(document.getElementById('pgcd-f-deg').value);
  const degG=parseInt(document.getElementById('pgcd-g-deg').value);
  const fCoeffs=getPolyCoeffs('pgcd-f',degF);
  const gCoeffs=getPolyCoeffs('pgcd-g',degG);
  const f=new Poly(fCoeffs);
  const g=new Poly(gCoeffs);
  if(f.isZero()&&g.isZero()){showResults(`<div class="info-box error">输入不能都为零多项式</div>`);return;}
  const{gcd,steps}=polyGcd(f,g);
  showResults(steps.join('\n'),`<div class="result-value">gcd = ${gcd.toHTML()}</div>`);
}

// NUMPAD LOGIC

let lastAns=null;

function saveAns(v){
  if(v===null||v===undefined)return;
  lastAns=v;
  const btn=document.getElementById('np-ans-btn');
  if(!btn)return;
  let label='';
  if(Array.isArray(v)&&v.length>0){
    label=`${v.length}×${v[0].length}矩阵`;
  }else{
    label=v instanceof Frac?v.toStr():String(v);
  }
  btn.innerHTML=`ANS<br><span style="font-size:.62rem;opacity:.85">${label}</span>`;
  btn.classList.remove('inactive');
  btn.classList.add('active');
}

function triggerDimRebuild(el){
  const fn=(el.dataset.rebuild||'').trim().replace(/\(\)$/,'');
  if(fn&&typeof window[fn]==='function')window[fn]();
}

function setupNumpadListeners(){
  document.querySelectorAll('.mat-cell,.poly-coeff,.scalar-input,.dim-cell').forEach(el=>{
    el.removeEventListener('focus',showNumpadHandler);
    el.addEventListener('focus',showNumpadHandler);
  });
}

function showNumpadHandler(){activeCell=this;showNumpad();}

function showNumpad(){
  document.getElementById('numpad-wrap').classList.add('visible');
  document.body.classList.add('numpad-open');
  updateCamBar();
}
function hideNumpad(){
  document.getElementById('numpad-wrap').classList.remove('visible');
  document.body.classList.remove('numpad-open');
  if(activeCell){activeCell.blur();activeCell=null;}
}
function updateCamBar(){
  const isMat=activeCell&&activeCell.classList.contains('mat-cell');
  document.getElementById('np-cam-btn').classList.toggle('mat-active',!!isMat);
}

function npInput(val){
  if(!activeCell)return;
  if(activeCell.classList.contains('dim-cell')){
    const n=parseInt(val);
    if(isNaN(n)||n<1||n>6)return;
    activeCell.value=String(n);
    triggerDimRebuild(activeCell);
    return;
  }
  const cur=activeCell.value;
  if(cur==='0'&&val!=='.'&&val!=='/')activeCell.value=val;
  else activeCell.value=cur+val;
  const id=activeCell.id;
  if(id){const m=id.match(/^(p[a-z]+-[fg])_c\d+$/);if(m)updatePolyDisplay(m[1]);}
}
function npBackspace(){
  if(!activeCell||activeCell.classList.contains('dim-cell'))return;
  activeCell.value=activeCell.value.slice(0,-1)||'0';
}
function npClear(){
  if(!activeCell)return;
  if(activeCell.classList.contains('dim-cell')){activeCell.value='1';triggerDimRebuild(activeCell);return;}
  activeCell.value='0';
}
function npPrevCell(){
  if(!activeCell)return;
  const all=Array.from(document.querySelectorAll('.mat-cell,.poly-coeff,.scalar-input,.dim-cell'));
  const idx=all.indexOf(activeCell);
  if(idx>0){all[idx-1].focus();activeCell=all[idx-1];}
}
function npNextCell(){
  if(!activeCell)return;
  const all=Array.from(document.querySelectorAll('.mat-cell,.poly-coeff,.scalar-input,.dim-cell'));
  const idx=all.indexOf(activeCell);
  if(idx>=0&&idx<all.length-1){all[idx+1].focus();activeCell=all[idx+1];}
}
function npAns(){
  if(!activeCell||lastAns===null)return;
  if(activeCell.classList.contains('dim-cell'))return;
  if(lastAns instanceof Frac||typeof lastAns==='number'){
    activeCell.value=lastAns instanceof Frac?lastAns.toStr():String(lastAns);
    const id=activeCell.id;
    if(id){const m=id.match(/^(p[a-z]+-[fg])_c\d+$/);if(m)updatePolyDisplay(m[1]);}
  }else if(Array.isArray(lastAns)&&lastAns.length>0){
    const cellId=activeCell.id;
    const match=cellId.match(/^(.+)_[ab]\d/);
    if(!match)return;
    const prefix=match[1];
    const ansRows=lastAns.length,ansCols=lastAns[0].length;
    const rowsEl=document.getElementById(`${prefix}-rows`);
    const colsEl=document.getElementById(`${prefix}-cols`);
    let needRebuild=false;
    if(rowsEl&&parseInt(rowsEl.value)!==ansRows){rowsEl.value=ansRows;needRebuild=true;}
    if(colsEl&&parseInt(colsEl.value)!==ansCols){colsEl.value=ansCols;needRebuild=true;}
    if(needRebuild){
      const src=rowsEl||colsEl;
      if(src){const fn=(src.dataset.rebuild||'').replace(/\(\)$/,'');if(typeof window[fn]==='function')window[fn]();}
      setTimeout(()=>fillMatrixFromAns(prefix,lastAns),60);
    }else{fillMatrixFromAns(prefix,lastAns);}
  }
}
function fillMatrixFromAns(prefix,mat){
  for(let i=0;i<mat.length;i++)for(let j=0;j<mat[i].length;j++){
    const el=document.getElementById(`${prefix}_a${i}_${j}`);
    if(el){const v=mat[i][j];el.value=v instanceof Frac?v.toStr():String(Math.round(v*1e9)/1e9);}
  }
}
function onCellFocus(el){
  activeCell=el;
  el.classList.add('focused');
  if(!el.classList.contains('dim-cell')&&el.value==='0')el.select();
  showNumpad();
  updateCamBar();
}
function onCellBlur(el){el.classList.remove('focused');}

function setCamStatus(msg){
  const el=document.getElementById('cam-status');
  el.textContent=msg;
  el.style.display=msg?'block':'none';
}

async function shootPhoto(){
  const video=document.getElementById('cam-video');
  const canvas=document.getElementById('cam-canvas');
  if(!video.videoWidth){setCamStatus('相机未就绪，请稍候');return;}

  const btn=document.getElementById('cam-shoot-btn');
  btn.disabled=true;

  // 裁剪与正方形框对齐的中心区域
  const vw=video.videoWidth, vh=video.videoHeight;
  // 正方形边长 = min(视频宽*0.7, 视频高*0.7)
  const side = Math.min(vw, vh) * 0.7;
  const cx = (vw - side) / 2;
  const cy = (vh - side) / 2 - vh * 0.05; // 与 CSS 的 -55% 对应，稍微偏上
  canvas.width = side; canvas.height = side;
  canvas.getContext('2d').drawImage(video, cx, cy, side, side, 0, 0, side, side);

  try{
    const matrix=await recognizeMatrix(canvas);
    if(!matrix||!matrix.length){
      setCamStatus('未识别到矩阵，请调整角度重试');
      btn.disabled=false;
      return;
    }
    await applyOcrMatrix(matrix);
    closeCamModal();
  }catch(e){
    setCamStatus('识别失败：'+e.message);
    btn.disabled=false;
  }
}

// ============================================================
// MATRIX OCR — Tesseract.js (全 CDN，无需本地文件)
// ============================================================
// ============================================================
// MATRIX OCR — Tesseract.js 高层 API（无需手动管理 worker/路径）
// ============================================================
async function recognizeMatrix(canvas) {
  setCamStatus('识别中…（首次需下载约 4 MB）');
  try {
    // Tesseract.recognize() 高层 API：自动管理 worker，路径全走 CDN
    const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
      logger: m => {
        if (m.status === 'recognizing text')
          setCamStatus('识别中… ' + Math.round(m.progress * 100) + '%');
      },
      tessedit_char_whitelist: '0123456789.-+',
      tessedit_pageseg_mode: '6',
    });

    console.log('[OCR raw]', JSON.stringify(text));
    if (!text || !text.trim()) throw new Error('未识别到内容');

    // 清洗：把常见误识别符号替换掉
    // | → 空格（矩阵括号线），[ ] ( ) → 空格，O→0，S→5，l/I→1
    const cleaned = text
      .replace(/[|\[\](){}]/g, ' ')
      .replace(/O/g,'0').replace(/o(?=\d|\s)/g,'0')
      .replace(/(?<=\d|\s)S(?=\s|$)/g,'5')
      .replace(/(?<![\d.])l(?![\d.])/g,'1')
      .replace(/(?<![\d.])I(?![\d.])/g,'1');

    // 按行提取数字（支持负号，支持分数 /）
    const lines = cleaned.split('\n').map(l => l.trim()).filter(Boolean);
    const matrix = [];
    for (const line of lines) {
      // 匹配：可选负号 + 数字（含小数）
      const nums = line.match(/-?\d+(?:\.\d+)?/g);
      if (nums && nums.length > 0) matrix.push(nums.map(Number));
    }

    // 过滤明显噪声行（单个数字且所有行都多于1列时丢弃）
    const validRows = matrix.filter(r => r.length > 0);
    if (!validRows.length) throw new Error('无法解析为矩阵');

    // 找众数列数作为标准列数
    const colCounts = validRows.map(r => r.length);
    const modeCol = colCounts.sort((a,b)=>
      colCounts.filter(v=>v===b).length - colCounts.filter(v=>v===a).length
    )[0];
    // 只保留列数 == 众数 或 相差不超过1的行
    const filtered = validRows.filter(r => Math.abs(r.length - modeCol) <= 1);
    if (!filtered.length) throw new Error('无法解析为矩阵');

    // 补齐到众数列数
    filtered.forEach(r => { while (r.length < modeCol) r.push(0); r.splice(modeCol); });
    return filtered;

  } catch (e) {
    console.error('OCR 失败:', e);
    setCamStatus('识别失败：' + e.message);
    return null;
  }
}
async function applyOcrMatrix(matrix) {
  if (!matrix || !Array.isArray(matrix) || matrix.length === 0) {
    setCamStatus('识别结果无效');
    return;
  }

  // 从 ocrTargetCell 的 id（格式：prefix_aI_J）提取 prefix
  if (!ocrTargetCell) { setCamStatus('找不到目标单元格'); return; }
  const idMatch = ocrTargetCell.id.match(/^(.+)_a\d+_\d+$/);
  if (!idMatch) { setCamStatus('无法识别目标区域'); return; }
  const prefix = idMatch[1];

  // 自动调整尺寸：更新 rows/cols 输入框并重建矩阵
  const rowsEl = document.getElementById(`${prefix}-rows`);
  const colsEl = document.getElementById(`${prefix}-cols`);
  const newRows = matrix.length;
  const newCols = matrix[0].length;
  let needRebuild = false;
  if (rowsEl && parseInt(rowsEl.value) !== newRows) { rowsEl.value = newRows; needRebuild = true; }
  if (colsEl && parseInt(colsEl.value) !== newCols) { colsEl.value = newCols; needRebuild = true; }
  if (needRebuild) {
    // 触发 rebuild（调用 input 事件）
    [rowsEl, colsEl].forEach(el => { if (el) el.dispatchEvent(new Event('input')); });
    await new Promise(r => setTimeout(r, 80)); // 等待重建
  }

  // 填值
  fillOcrValues(prefix, matrix);
  setCamStatus('识别完成 ✓');
}

function fillOcrValues(prefix,rows){
  for(let i=0;i<rows.length;i++){
    for(let j=0;j<rows[i].length;j++){
      const el=document.getElementById(`${prefix}_a${i}_${j}`);
      if(el)el.value=String(rows[i][j]);
    }
  }
  const first=document.getElementById(`${prefix}_a0_0`);
  if(first){first.focus();activeCell=first;}
}

// ============================================================
// SIDEBAR TOGGLE
// ============================================================
function toggleSidebar(){
  const s=document.getElementById('sidebar');
  const o=document.getElementById('overlay');
  s.classList.toggle('open');
  o.classList.toggle('visible');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
}

// ============================================================
// INIT
// ============================================================
function navigate(){
  const hash=location.hash.slice(1);
  if(!hash||hash==='hub'){
    renderHub();
  } else {
    renderTool(hash);
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  navigate();
  window.addEventListener('hashchange',navigate);
  setupNumpadListeners();
  document.addEventListener('pointerdown',e=>{
    if(!e.target.closest('#numpad-wrap')&&
       !e.target.classList.contains('mat-cell')&&
       !e.target.classList.contains('poly-coeff')&&
       !e.target.classList.contains('scalar-input')&&
       !e.target.classList.contains('dim-cell')){
      hideNumpad();
    }
  });
    // 定义需要禁用长按菜单的选择器
  const noMenuSelectors = '.mat-cell, .poly-coeff, .scalar-input, .dim-cell';

  // 使用事件委托或直接绑定
  document.body.addEventListener('contextmenu', function(e) {
    // 检查触发事件的元素是否匹配我们的选择器
    if (e.target.matches(noMenuSelectors)) {
      e.preventDefault(); // 阻止默认菜单
      e.stopPropagation(); // 阻止事件冒泡
      return false;
    }
  }, { passive: false });
});
</script>
