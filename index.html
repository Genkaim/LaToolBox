<style>
:root {
  --bg:      #f4f4f46f;
  --bg2:     #e9e9e9a5;
  --surface: #e9e9e9a5;
  --surface2:#d4d4d4;
  --border:  #243448;
  --border2: #2e4060;
  --text:    #262729;
  --text2:   #51575e;
  --accent:  rgb(114, 116, 54);
  --accent2: rgb(194, 144, 144);
  --green:   #000000;
  --red:     #e05252;
  --purple:  #a78bfa;
  --r: 8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== HEADER ===== */
#header{
  border-bottom:1px solid var(--border);
  padding:0 20px;
  height:54px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
  position:sticky;top:0;z-index:200;
      backdrop-filter: blur(20px);
    background-color: #f4f4f46f;
}
.logo{
  display:flex;align-items:center;gap:10px;
  font-family:'Noto Serif SC',serif;
  text-decoration:none;
  cursor:pointer;
}
.logo-icon{
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-text{
  font-size:1.05rem;font-weight:700;
  color:var(--text);letter-spacing:.3px;
  line-height:1.15;
}
.logo-text span{color:#ffb13b}
.logo-sub{
  font-size:.65rem;color:var(--text2);
  font-family:'IBM Plex Sans',sans-serif;font-weight:300;
  letter-spacing:.5px;text-transform:uppercase;
  margin-top:1px;
}
#menu-toggle{
  display:none;background:none;border:1px solid var(--border2);
  color:var(--text2);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:18px;
}

/* ===== LAYOUT ===== */
#app{
  display:flex;flex:1;min-height:0;overflow:hidden;
}

/* ===== SIDEBAR ===== */
#sidebar{
  width:260px;min-width:260px;
  background:#f4f4f4;
  border-right:1px solid var(--border);
  overflow-y:auto;
  padding:7px 0;
  flex-shrink:0;
}
.cat-header{
  padding:8px 16px 4px;
  background-color: #ffffff00;
  border-radius: 0px 30px 30px 0px;
  margin-right: 20px;
  padding-top: 7px;
  padding-bottom: 7px;
  padding-left: 20px;
  font-size:.9rem;font-weight:600;
  color:#a5a5a5;letter-spacing:1.5px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}

.tool-btn{
  display:block;width:100%;text-align:left;
  padding:9px 16px 9px 28px;
  background:none;border:none;color:var(--text2);
  font-size:.88rem;cursor:pointer;transition:all .15s;
  border-left:2px solid transparent;
  font-family:'IBM Plex Sans',sans-serif;
}
.tool-btn:hover{color:var(--text);background:var(--surface);border-left-color:var(--border2)}
.tool-btn.active{
  background:rgba(82, 82, 82, 0.08);
  border-left-color:var(--accent);font-weight:500;
}

/* ===== MAIN ===== */
#main{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:20px;
  min-width:0;
  display:flex;flex-direction:column;
}

/* ===== WELCOME ===== */
#welcome{
  max-width:600px;margin:40px auto;text-align:center;
}
.welcome-title{
  font-family:'Noto Serif SC',serif;
  font-size:2rem;font-weight:700;color: black;margin-bottom:8px;
}
.welcome-sub{color:var(--text2);font-size:.95rem;line-height:1.7}
.feature-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:28px;
}
.feature-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px;text-align:center;
}
.feature-card .icon{font-size:1.6rem;margin-bottom:6px}
.feature-card .label{font-size:.8rem;color:var(--text2)}

/* ===== TOOL PANEL ===== */
.tool-panel{max-width:860px}
.panel-title{
  font-family:'Noto Serif SC',serif;
  font-size:1.4rem;font-weight:700;color:var(--text);
  margin-bottom:4px;
  display:flex;align-items:center;gap:8px;
}
.panel-title::before{
  content:attr(data-icon);
  font-size:1.2rem;
}
.panel-desc{font-size:.85rem;color:var(--text2);margin-bottom:20px}

/* ===== CARD ===== */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:18px;margin-bottom:16px;
}
.card-title{
  font-size:.85rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;
}

/* ===== DIM SELECTOR ===== */
.dim-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.dim-label{font-size:.85rem;color:var(--text2)}
.dim-select{
  background:var(--bg2);border:1px solid var(--border2);
  color:var(--text);border-radius:5px;padding:4px 8px;
  font-size:.85rem;cursor:pointer;
}
.dim-select:focus{outline:none;border-color:var(--accent)}
.dim-cell{
  width:36px;height:30px;
  background:var(--bg2);border:1px solid var(--border2);
  color:var(--text);border-radius:5px;
  text-align:center;font-size:.95rem;font-weight:600;
  font-family:'JetBrains Mono',monospace;
  cursor:pointer;
}
.dim-cell:focus{outline:none;border-color:var(--accent);background:var(--surface2)}
.dim-cell.focused{border-color:var(--accent)}

/* ===== MATRIX INPUT ===== */
.matrix-input-wrap{
  overflow-x:auto;padding-bottom:4px;
}
.matrix-input-table{
  border-collapse:separate;border-spacing:4px;
}
.mat-cell{
  width:52px;height:36px;
  background:var(--bg2);border:1px solid var(--border2);
  color:var(--text);border-radius:5px;
  text-align:center;font-size:.9rem;
  font-family:'JetBrains Mono',monospace;
  transition:border-color .15s;
  -webkit-appearance:none;
}
.mat-cell:focus{outline:none;border-color:var(--accent);background:var(--surface2)}
.mat-cell.focused{border-color:var(--accent)}
.aug-divider{
  width:2px;background:var(--accent2);border-radius:1px;
  margin:0 4px;
}

/* ===== BUTTONS ===== */
.btn{
  padding:9px 20px;border:none;border-radius:6px;
  cursor:pointer;font-size:.9rem;font-weight:500;
  font-family:'IBM Plex Sans',sans-serif;
  transition:all .15s;
}
.btn-primary{
  background:linear-gradient(135deg,#3d3d3d,#535353);
  color:#ffffff;
}
.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text);
}
.btn-secondary:hover{border-color:var(--accent);}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

/* Sub-method selector */
.method-tabs{
  display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;
}

.method-tab{
  padding:6px 14px;border-radius:20px;
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text2);cursor:pointer;font-size:.83rem;
  transition:all .15s;
}
.method-tab.active{
  background:rgba(35, 35, 35, 0.819);color:white;
font-weight:500;
}

/* ===== RESULTS ===== */
#results{margin-top:20px;max-width:860px}
.result-block{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:18px;margin-bottom:14px;
}
.result-title{
  font-size:.8rem;font-weight:600;color:var(--green);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;
}
.result-value{
  font-family:'JetBrains Mono',monospace;
  font-size:1.05rem;color:var(--green);
  font-weight:600;
}

/* ===== STEPS ===== */
.steps-container{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;
}
.step{
  margin-bottom:14px;padding-bottom:14px;
  border-bottom:1px solid var(--border);
}
.step:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.step-num{
  display:inline-block;
  width:22px;height:22px;line-height:22px;text-align:center;
  background:rgb(189, 189, 189);color:#000;border-radius:50%;
  font-size:.75rem;font-weight:700;margin-right:6px;flex-shrink:0;
}
.step-desc{
  font-size:.88rem;color:var(--text2);margin-bottom:8px;
  display:flex;align-items:center;flex-wrap:wrap;gap:4px;
}
.op-badge{
  background:rgba(58,142,255,.15);border:1px solid rgba(58,142,255,.3);
  color:var(--accent2);border-radius:4px;
  padding:1px 7px;font-family:'JetBrains Mono',monospace;font-size:.82rem;
}

/* ===== MATRIX DISPLAY ===== */
.mat-disp-wrap{
  display:inline-flex;align-items:stretch;gap:0;margin:6px 4px;
}
.mat-bracket{
  width:7px;border:2px solid var(--accent);
}
.mat-bracket.left{border-right:none;border-radius:4px 0 0 4px}
.mat-bracket.right{border-left:none;border-radius:0 4px 4px 0}
.mat-disp-table{
  border-collapse:separate;border-spacing:0;
}
.mat-disp-table td{
  padding:3px 8px;
  text-align:center;
  font-family:'JetBrains Mono',monospace;
  font-size:.88rem;
  color:var(--text);
  min-width:36px;
}
.mat-aug-line{
  border-right:1px solid var(--accent2) !important;
}
.mat-pivot{color:var(--accent);font-weight:600}

/* Fraction display */
.frac-disp{
  display:inline-flex;flex-direction:column;align-items:center;
  vertical-align:middle;font-size:.8em;line-height:1.1;
}
.frac-disp .fn{border-bottom:1px solid currentColor;padding:0 2px}
.frac-disp .fd{padding:0 2px}

/* Column vector display */
.vec-disp{display:inline-flex;align-items:stretch;gap:0;margin:2px 4px}

/* ===== SCALAR INPUT ===== */
.scalar-input{
  width:80px;height:36px;
  background:var(--bg2);border:1px solid var(--border2);
  color:var(--text);border-radius:5px;
  text-align:center;font-size:.9rem;
  font-family:'JetBrains Mono',monospace;
}
.scalar-input:focus{outline:none;border-color:var(--accent)}

/* ===== POLY INPUT ===== */
.poly-input-row{
  display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:8px;
}
.poly-coeff{
  width:52px;height:36px;
  background:var(--bg2);border:1px solid var(--border2);
  color:var(--text);border-radius:5px;
  text-align:center;font-size:.9rem;
  font-family:'JetBrains Mono',monospace;
}
.poly-coeff:focus{outline:none;border-color:var(--accent)}
.poly-term-label{
  font-size:.82rem;color:var(--text2);
  font-family:'JetBrains Mono',monospace;
}
.poly-display{
  font-family:'JetBrains Mono',monospace;
  font-size:1.1rem;color:var(--text);
  padding:8px 12px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:5px;
  margin-top:6px;
}

/* ===== NUMPAD WRAPPER ===== */
#numpad-wrap{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:500;
  flex-direction:column;align-items:center;
  pointer-events:none;
}
#numpad-wrap.visible{display:flex;}

/* ===== TOP BAR (cam + close) ===== */
#np-top-bar{
  display:flex;align-items:stretch;
  align-self:flex-end;
  margin-right:calc(50% - 248px);
  margin-bottom:5px;
  height:30px;
  background:#e9e9e9;
  border:1px solid var(--border2);
  border-radius:8px;
  overflow:hidden;
  pointer-events:all;
}
@media(max-width:500px){#np-top-bar{margin-right:10px;}}

#np-cam-btn{
  display:flex;align-items:center;gap:5px;
  padding:0 12px;
  background:transparent;border:none;
  color:rgb(80,82,20);
  font-size:.73rem;font-weight:600;
  font-family:'IBM Plex Sans',sans-serif;
  cursor:pointer;white-space:nowrap;
  transition:background .15s;
  opacity:.35;pointer-events:none;
}
#np-cam-btn.mat-active{opacity:1;pointer-events:all;}
#np-cam-btn:hover{background:rgba(114,116,54,.12);}
#np-cam-btn.loading{opacity:.4;pointer-events:none;}



/* ===== NUMPAD ===== */
#numpad{
  width:100%;max-width:500px;
  background:#e9e9e9;
  border:1px solid var(--border2);
  padding:10px 10px 16px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  box-shadow:0 -8px 30px rgba(0,0,0,0.037);
  border-radius:12px 12px 0 0;
  pointer-events:all;
}
.np-btn{
  height:44px;border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);
  border-radius:7px;cursor:pointer;font-size:1rem;
  font-family:'JetBrains Mono',monospace;
  transition:all .1s;
  display:flex;align-items:center;justify-content:center;
}
.np-btn:active{background:var(--accent);color:#000}
.np-btn.special{background:var(--bg2);color:#979c85}
.np-btn.confirm{background:rgba(0, 0, 0, 0.732);color:#ffffff;font-weight:600}
.np-btn.clear{background:rgba(224,82,82,.15);color:var(--red);border-color:rgba(224,82,82,.3)}
.np-btn.ans{background:rgba(114,116,54,.12);color:var(--accent);border-color:rgba(114,116,54,.35);font-size:.82rem;font-weight:600;flex-direction:column;gap:1px}
.np-btn.ans.active{background:rgba(114,116,54,.25)}
.np-btn.ans.inactive{opacity:.4;cursor:not-allowed}

/* ===== CAMERA MODAL ===== */
#cam-modal{
  display:none;position:fixed;inset:0;z-index:700;
  background:#000;flex-direction:column;
  align-items:center;justify-content:center;
}
#cam-modal.open{display:flex}
#cam-video{
  width:100%;max-height:calc(100vh - 120px);
  object-fit:cover;flex:1;
}
#cam-controls{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px 28px;background:#000;flex-shrink:0;
}
#cam-cancel-btn{
  color:#fff;background:none;border:1px solid rgba(255,255,255,.3);
  border-radius:8px;padding:8px 16px;cursor:pointer;font-size:.85rem;
  font-family:'IBM Plex Sans',sans-serif;
}
#cam-shoot-btn{
  width:62px;height:62px;border-radius:50%;
  background:#fff;border:4px solid rgba(255,255,255,.4);
  cursor:pointer;color:#000;
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s;
}
#cam-shoot-btn:active{transform:scale(.92)}
#cam-crop-box{
  position:absolute;
  /* 手机：70vw 正方形；桌面：固定 400px */
  width:min(70vw,400px);
  height:min(70vw,400px);
  top:50%;left:50%;
  transform:translate(-50%,-55%);
  border:2px solid rgba(255,255,255,.9);
  border-radius:10px;
  box-shadow:0 0 0 9999px rgba(0,0,0,.5);
  pointer-events:none;
}
#cam-hint{
  position:absolute;top:16px;left:0;right:0;
  text-align:center;color:rgba(255,255,255,.7);
  font-size:.8rem;font-family:'IBM Plex Sans',sans-serif;
  pointer-events:none;
}
#cam-status{
  position:absolute;bottom:108px;left:0;right:0;
  text-align:center;color:#fff;
  font-size:.84rem;font-family:'IBM Plex Sans',sans-serif;
  background:rgba(0,0,0,.6);padding:7px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== OCR OVERLAY ===== */
.eq-display{
  font-family:'JetBrains Mono',monospace;
  font-size:.9rem;color:var(--text);
  line-height:1.9;
}
.eq-var{color:var(--accent2)}
.eq-coeff{color:var(--text)}
.eq-result{color:var(--green);font-weight:600}

/* ===== INFO BOXES ===== */
.info-box{
  padding:10px 14px;border-radius:6px;
  margin:8px 0;font-size:.85rem;line-height:1.6;
}
.info-box.success{
  background:rgba(48,200,138,.1);border-left:3px solid var(--green);
  color:var(--green);
}
.info-box.warning{
  background:rgba(240,165,0,.1);border-left:3px solid var(--accent);
  color:var(--accent);
}
.info-box.error{
  background:rgba(224,82,82,.1);border-left:3px solid var(--red);
  color:var(--red);
}
.info-box.info{
  background:rgba(58,142,255,.1);border-left:3px solid var(--accent2);
  color:var(--accent2);
}

/* ===== EIGENVALUE TABLE ===== */
.eigen-table{
  border-collapse:collapse;margin-top:8px;font-size:.88rem;
  font-family:'JetBrains Mono',monospace;
}
.eigen-table th{
  background:var(--surface2);color:var(--accent);
  padding:6px 12px;font-size:.78rem;text-transform:uppercase;letter-spacing:.8px;
  border:1px solid var(--border2);
}
.eigen-table td{
  padding:6px 12px;border:1px solid var(--border);
  vertical-align:top;
}

/* ===== POLY LONG DIV ===== */
.poly-div-display{
  font-family:'JetBrains Mono',monospace;
  font-size:.9rem;
  overflow-x:auto;
}
.poly-div-line{
  padding:3px 0;
  border-bottom:1px solid var(--border);
}
.poly-highlight{color:var(--accent);font-weight:600}

/* ===== RESPONSIVE ===== */
@media(max-width:700px){
  #menu-toggle{display:block}
  #sidebar{
    position:fixed;top:54px;left:0;bottom:0;z-index:300;
    transform:translateX(-100%);transition:transform .25s;
    width:240px;min-width:240px;
  }
  #sidebar.open{transform:none;box-shadow:4px 0 20px rgba(0, 0, 0, 0)}
  #main{padding:14px}
  .mat-cell{width:44px;height:32px;font-size:.82rem}
  .feature-grid{grid-template-columns:repeat(2,1fr)}
  .mat-disp-table td{padding:2px 5px;min-width:28px;font-size:.82rem}
}
@media(max-width:400px){
  .mat-cell{width:38px;height:30px}
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text2)}

/* ===== NUMPAD OPEN ===== */
body.numpad-open #main{padding-bottom:270px;}

/* ===== GITHUB STAR BADGE ===== */
#gh-star-header{
  display:flex;align-items:center;gap:5px;
  padding:4px 8px 4px 7px;
  border:1px solid var(--border2);border-radius:6px;
  color:var(--text2);text-decoration:none;
  font-size:.75rem;font-family:'IBM Plex Sans',sans-serif;
  transition:border-color .15s,color .15s,background .15s;
  white-space:nowrap;background:transparent;
}
#gh-star-header:hover{border-color:#e3b341;color:var(--text);background:rgba(227,179,65,.06);}
.gh-star-label{font-weight:500}
@media(max-width:700px){#gh-star-header{display:none}}
#gh-star-sidebar{
  display:none;
  width:calc(100% - 20px);
  margin:4px 10px 4px;padding:9px 14px;
  border:1px solid var(--border2);border-radius:8px;
  color:var(--text);text-decoration:none;
  font-size:.88rem;font-family:'IBM Plex Sans',sans-serif;font-weight:500;
  transition:border-color .15s,background .15s;
  background:linear-gradient(135deg,rgba(61,61,61,.1),rgba(83,83,83,.08));
  box-sizing:border-box;
  align-items:center;gap:8px;
}
@media(max-width:700px){#gh-star-sidebar{display:flex}}
#gh-star-sidebar svg{flex-shrink:0;}
#gh-star-sidebar:hover{border-color:#e3b341;background:rgba(227,179,65,.06);}

/* ===== PAGE FOOTER ===== */
#page-footer{
  margin-top:auto;padding:40px 0 20px;
  text-align:center;font-size:.78rem;
  color:var(--text2);letter-spacing:.5px;
  font-family:'Times New Roman',Times,serif;opacity:.8;
}
#page-footer a{
  color:#5a7ab5;text-decoration:none;
  font-family:'Times New Roman',Times,serif;transition:color .15s;
}
#page-footer a:hover{color:#3a5a9a;text-decoration:underline;}

/* ===== HUB PAGE ===== */
/* ===== HUB PAGE — desktop base ===== */
#hub-page{max-width:900px}
.hub-title{
  font-family:'Noto Serif SC',serif;
  font-size:1.6rem;font-weight:700;color:var(--text);
  margin-bottom:4px;
}
.hub-subtitle{font-size:.88rem;color:var(--text2);margin-bottom:24px}
.hub-section{margin-bottom:20px}
.hub-section-label{
  font-size:.75rem;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;
  color:#a5a5a5;margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
  padding-left:2px;
}
.hub-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
}
.hub-section-label{grid-column:1/-1}
.hub-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 16px;
  cursor:pointer;transition:all .18s;
  display:flex;flex-direction:column;gap:6px;
  text-align:left;
}
.hub-card:hover{
  border-color:var(--accent);
  background:rgba(82,82,82,.08);
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(0,0,0,.07);
}
.hub-card-icon{font-size:1.3rem;line-height:1;color:var(--text2)}
.hub-card-name{
  font-size:.88rem;font-weight:600;color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;
  line-height:1.3;
}
.hub-card-desc{font-size:.75rem;color:var(--text2);line-height:1.4}
  .hub-section-label{font-size:.68rem;margin-top:5px;margin-bottom:0px;}
/* ===== HUB PAGE — mobile ===== */
@media(max-width:700px){
  .hub-title{font-size:1.1rem;margin-bottom:2px}
  .hub-subtitle{font-size:.75rem;margin-bottom:12px}
  .hub-section{margin-bottom:10px}
  .hub-section-label{font-size:.68rem;margin-top:8px;margin-bottom:0px;}
  .hub-grid{grid-template-columns:repeat(2,1fr);gap:5px}
  .hub-card{
    flex-direction:row;align-items:center;
    padding:7px 10px;gap:7px;border-radius:6px;
  }
  .hub-card:hover{transform:none}
  .hub-card-icon{font-size:.9rem;flex-shrink:0}
  .hub-card-name{font-size:.8rem;font-weight:500}
  .hub-card-desc{display:none}
}

/* ===== TOOL BOTTOM BUTTONS ===== */
.tool-bottom-bar{
  display:flex;gap:10px;flex-wrap:wrap;
  margin-top:16px;padding-bottom:24px;
}
.btn-back-top{
  display:flex;align-items:center;gap:6px;
  padding:8px 18px;border-radius:6px;
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text2);cursor:pointer;font-size:.85rem;
  font-family:'IBM Plex Sans',sans-serif;
  transition:all .15s;
}
.btn-back-top:hover{border-color:var(--accent);color:var(--text)}
.btn-to-hub{
  display:flex;align-items:center;gap:6px;
  padding:8px 18px;border-radius:6px;
  background:linear-gradient(135deg,#3d3d3d,#535353);
  border:none;color:#fff;cursor:pointer;font-size:.85rem;
  font-family:'IBM Plex Sans',sans-serif;
  transition:all .15s;
}
.btn-to-hub:hover{filter:brightness(1.12)}

/* Hub sidebar btn */
.hub-sidebar-btn{
  display:flex;align-items:center;gap:8px;
  width:calc(100% - 20px);
  margin:4px 10px 4px;
  padding:9px 14px;
  background:linear-gradient(135deg,rgba(61,61,61,.1),rgba(83,83,83,.08));
  border:1px solid var(--border2);
  border-radius:8px;
  color:var(--text);font-size:.88rem;font-weight:500;
  cursor:pointer;text-align:left;
  font-family:'IBM Plex Sans',sans-serif;
  transition:all .15s;
  box-sizing:border-box;
}
.hub-sidebar-btn span:first-child{
  font-size:14px;line-height:1;
  width:14px;text-align:center;flex-shrink:0;
}
.hub-sidebar-btn:hover{border-color:var(--accent);background:rgba(82,82,82,.12)}
.hub-sidebar-btn.active{border-color:var(--accent);background:rgba(82,82,82,.13)}

/* ===== OVERLAY ===== */
#overlay{
  display:none;position:fixed;inset:0;z-index:299;
  background:rgba(106, 0, 0, 0);
}
#overlay.visible{display:block}

/* ===== HISTORY ===== */
.hist-empty{
  text-align:center;color:var(--text2);
  font-size:.88rem;padding:40px 0;
}
.hist-entry{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:10px;overflow:hidden;
}
.hist-entry-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;cursor:pointer;user-select:none;
  transition:background .15s;
}
.hist-entry-header:hover{background:var(--surface2)}
.hist-entry-left{display:flex;align-items:center;gap:10px}
.hist-entry-tool{
  font-size:.78rem;font-weight:600;letter-spacing:.6px;
  text-transform:uppercase;color:var(--accent);
}
.hist-entry-time{font-size:.75rem;color:var(--text2)}
.hist-entry-toggle{font-size:.8rem;color:var(--text2);flex-shrink:0}
.hist-entry-body{
  display:none;
  border-top:1px solid var(--border);
  padding:14px;
}
.hist-entry-body.open{display:block}
.hist-clear-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:6px;
  background:rgba(224,82,82,.08);border:1px solid rgba(224,82,82,.25);
  color:var(--red);cursor:pointer;font-size:.82rem;
  font-family:'IBM Plex Sans',sans-serif;transition:all .15s;
}
.hist-clear-btn:hover{background:rgba(224,82,82,.15)}
</style>

<script>
'use strict';
// ============================================================
// FRACTION CLASS
// ============================================================
class Frac {
  constructor(n, d) {
    if (typeof n === 'string') {
      n = n.trim();
      if (n.includes('/')) {
        const parts = n.split('/');
        n = parseInt(parts[0]); d = parseInt(parts[1]);
      } else {
        const f = parseFloat(n);
        if (!isFinite(f)) { this.n=0;this.d=1;return; }
        if (Number.isInteger(f)) { n=f; d=1; }
        else {
          const s = n.toString();
          const dec = s.length - s.indexOf('.') - 1;
          d = Math.pow(10, dec);
          n = Math.round(f * d);
        }
      }
    }
    if (d === undefined) d = 1;
    d = Math.round(d); n = Math.round(n);
    if (d === 0) { this.n=NaN;this.d=1;return; }
    if (n === 0) { this.n=0;this.d=1;return; }
    const g = Frac._gcd(Math.abs(n), Math.abs(d));
    if (d < 0) { n=-n; d=-d; }
    this.n = n/g; this.d = d/g;
  }
  static _gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){const t=b;b=a%b;a=t;}return a||1;}
  static from(v){if(v instanceof Frac)return v;return new Frac(v);}
  add(o){o=Frac.from(o);return new Frac(this.n*o.d+o.n*this.d,this.d*o.d);}
  sub(o){o=Frac.from(o);return new Frac(this.n*o.d-o.n*this.d,this.d*o.d);}
  mul(o){o=Frac.from(o);return new Frac(this.n*o.n,this.d*o.d);}
  div(o){o=Frac.from(o);if(o.n===0)return new Frac(NaN);return new Frac(this.n*o.d,this.d*o.n);}
  neg(){return new Frac(-this.n,this.d);}
  abs(){return new Frac(Math.abs(this.n),this.d);}
  isZero(){return this.n===0;}
  isNaN(){return isNaN(this.n);}
  eq(o){o=Frac.from(o);return this.n===o.n&&this.d===o.d;}
  gt(o){o=Frac.from(o);return this.n*o.d>o.n*this.d;}
  lt(o){o=Frac.from(o);return this.n*o.d<o.n*this.d;}
  toFloat(){return this.n/this.d;}
  toStr(){
    if(this.d===1)return String(this.n);
    return `${this.n}/${this.d}`;
  }
  toHTML(){
    if(this.d===1)return `${this.n}`;
    const sign=this.n<0?'<span style="color:var(--text2)">−</span>':'';
    return `${sign}<span class="frac-disp"><span class="fn">${Math.abs(this.n)}</span><span class="fd">${this.d}</span></span>`;
  }
}
const F=(n,d)=>new Frac(n,d);
const F0=F(0),F1=F(1);

function parseCell(s){
  s=(s||'0').trim();
  if(s===''||s==='-')return F(0);
  try{return new Frac(s);}catch(e){return F(0);}
}

// ============================================================
// MATRIX UTILITIES
// ============================================================
function makeMatrix(r,c,val=0){
  return Array.from({length:r},()=>Array.from({length:c},()=>F(val)));
}
function cloneMatrix(m){
  return m.map(row=>row.map(v=>Frac.from(v)));
}
function matFromFloat(m){
  return m.map(row=>row.map(v=>{
    const f=Math.round(v*1e9)/1e9;
    // snap to nearby fraction with small denominator
    for(let d=1;d<=100;d++){
      const n=Math.round(f*d);
      if(Math.abs(n/d-f)<1e-7)return F(n,d);
    }
    return F(Math.round(f*1000),1000);
  }));
}
function matAdd(A,B){
  const r=A.length,c=A[0].length;
  return Array.from({length:r},(_,i)=>Array.from({length:c},(_,j)=>A[i][j].add(B[i][j])));
}
function matSub(A,B){
  const r=A.length,c=A[0].length;
  return Array.from({length:r},(_,i)=>Array.from({length:c},(_,j)=>A[i][j].sub(B[i][j])));
}
function matMul(A,B){
  const r=A.length,m=B.length,c=B[0].length;
  return Array.from({length:r},(_,i)=>Array.from({length:c},(_,j)=>{
    let s=F(0);
    for(let k=0;k<m;k++)s=s.add(A[i][k].mul(B[k][j]));
    return s;
  }));
}
function scalarMul(k,A){
  k=Frac.from(k);
  return A.map(row=>row.map(v=>k.mul(v)));
}
function transpose(A){
  const r=A.length,c=A[0].length;
  return Array.from({length:c},(_,j)=>Array.from({length:r},(_,i)=>A[i][j]));
}
function identity(n){
  return Array.from({length:n},(_,i)=>Array.from({length:n},(_,j)=>i===j?F(1):F(0)));
}
function appendRight(A,B){
  return A.map((row,i)=>[...row,...B[i]]);
}
function sliceCols(M,a,b){
  return M.map(row=>row.slice(a,b));
}

// ============================================================
// MATRIX DISPLAY (HTML)
// ============================================================
function dispMatrix(M,pivots=[],augAt=-1){
  const r=M.length, c=M[0].length;
  let html='<div class="mat-disp-wrap">';
  html+='<div class="mat-bracket left"></div>';
  html+='<table class="mat-disp-table"><tbody>';
  for(let i=0;i<r;i++){
    html+='<tr>';
    for(let j=0;j<c;j++){
      const isPivot=pivots.some(p=>p[0]===i&&p[1]===j);
      const cls=isPivot?' class="mat-pivot"':'';
      const augCls=(j===augAt-1)?' style="border-right:2px solid var(--accent2)"':'';
      html+=`<td${cls}${augCls}>${M[i][j].toHTML()}</td>`;
    }
    html+='</tr>';
  }
  html+='</tbody></table>';
  html+='<div class="mat-bracket right"></div>';
  html+='</div>';
  return html;
}

function dispVector(v){
  // v is array of Frac
  let html='<div class="mat-disp-wrap">';
  html+='<div class="mat-bracket left"></div>';
  html+='<table class="mat-disp-table"><tbody>';
  for(const x of v){
    html+=`<tr><td>${x.toHTML()}</td></tr>`;
  }
  html+='</tbody></table>';
  html+='<div class="mat-bracket right"></div>';
  html+='</div>';
  return html;
}

function dispFloatMatrix(M){
  const fmt=v=>{
    const f=Math.round(v*1e8)/1e8;
    if(Math.abs(f)<1e-10)return '0';
    return f.toFixed(4).replace(/\.?0+$/,'');
  };
  const r=M.length,c=M[0].length;
  let html='<div class="mat-disp-wrap">';
  html+='<div class="mat-bracket left"></div>';
  html+='<table class="mat-disp-table"><tbody>';
  for(let i=0;i<r;i++){
    html+='<tr>';
    for(let j=0;j<c;j++){
      html+=`<td>${fmt(M[i][j])}</td>`;
    }
    html+='</tr>';
  }
  html+='</tbody></table>';
  html+='<div class="mat-bracket right"></div>';
  html+='</div>';
  return html;
}

function step(desc,matHTML){
  return `<div class="step">
    <div class="step-desc">${desc}</div>
    <div>${matHTML}</div>
  </div>`;
}

function makeStepNum(n){
  return `<span class="step-num">${n}</span>`;
}

// ============================================================
// GAUSSIAN ELIMINATION (exact fractions, with steps)
// ============================================================
function gaussianElim(M, trackSteps=true){
  const steps=[];
  let m=cloneMatrix(M);
  const rows=m.length, cols=m[0].length;
  let pivotRow=0;
  const pivots=[];

  for(let col=0;col<cols&&pivotRow<rows;col++){
    // Find pivot
    let pRow=-1;
    for(let r=pivotRow;r<rows;r++){
      if(!m[r][col].isZero()){pRow=r;break;}
    }
    if(pRow===-1)continue;
    pivots.push([pivotRow,col]);

    // Swap
    if(pRow!==pivotRow){
      [m[pivotRow],m[pRow]]=[m[pRow],m[pivotRow]];
      if(trackSteps)steps.push(step(
        `${makeStepNum(steps.length+1)}<span>交换第${pivotRow+1}行与第${pRow+1}行</span> <span class="op-badge">R${pivotRow+1} ↔ R${pRow+1}</span>`,
        dispMatrix(m)
      ));
    }

    // Eliminate below
    for(let r=pivotRow+1;r<rows;r++){
      if(!m[r][col].isZero()){
        const factor=m[r][col].div(m[pivotRow][col]);
        const factorStr=factor.toStr();
        for(let c=col;c<cols;c++){
          m[r][c]=m[r][c].sub(factor.mul(m[pivotRow][c]));
        }
        if(trackSteps)steps.push(step(
          `${makeStepNum(steps.length+1)}<span>消去第${r+1}行第${col+1}列</span> <span class="op-badge">R${r+1} → R${r+1} − (${factorStr})·R${pivotRow+1}</span>`,
          dispMatrix(m)
        ));
      }
    }
    pivotRow++;
  }
  return {result:m,steps,pivots};
}

function rref(M, trackSteps=true){
  const steps=[];
  let m=cloneMatrix(M);
  const rows=m.length,cols=m[0].length;
  let pivotRow=0;
  const pivots=[];

  for(let col=0;col<cols&&pivotRow<rows;col++){
    let pRow=-1;
    for(let r=pivotRow;r<rows;r++){
      if(!m[r][col].isZero()){pRow=r;break;}
    }
    if(pRow===-1)continue;
    pivots.push([pivotRow,col]);

    if(pRow!==pivotRow){
      [m[pivotRow],m[pRow]]=[m[pRow],m[pivotRow]];
      if(trackSteps)steps.push(step(
        `${makeStepNum(steps.length+1)}<span>交换行</span> <span class="op-badge">R${pivotRow+1} ↔ R${pRow+1}</span>`,
        dispMatrix(m)
      ));
    }

    // Scale pivot row
    const pv=m[pivotRow][col];
    if(!pv.eq(F1)){
      const invPv=F1.div(pv);
      for(let c=col;c<cols;c++)m[pivotRow][c]=invPv.mul(m[pivotRow][c]);
      if(trackSteps)steps.push(step(
        `${makeStepNum(steps.length+1)}<span>化主元为1</span> <span class="op-badge">R${pivotRow+1} → (${invPv.toStr()})·R${pivotRow+1}</span>`,
        dispMatrix(m,pivots)
      ));
    }

    // Eliminate above and below
    for(let r=0;r<rows;r++){
      if(r!==pivotRow&&!m[r][col].isZero()){
        const factor=m[r][col];
        const factorStr=factor.toStr();
        for(let c=0;c<cols;c++){
          m[r][c]=m[r][c].sub(factor.mul(m[pivotRow][c]));
        }
        if(trackSteps)steps.push(step(
          `${makeStepNum(steps.length+1)}<span>消去第${r+1}行</span> <span class="op-badge">R${r+1} → R${r+1} − (${factorStr})·R${pivotRow+1}</span>`,
          dispMatrix(m,pivots)
        ));
      }
    }
    pivotRow++;
  }
  return {result:m,steps,pivots};
}

function matRank(M){
  const {pivots}=gaussianElim(M,false);
  return pivots.length;
}

// ============================================================
// DETERMINANT (cofactor expansion & row reduction)
// ============================================================
function determinant(M){
  const n=M.length;
  if(n!==M[0].length)return{steps:[],value:null,err:'矩阵必须为方阵'};
  const steps=[];
  let m=cloneMatrix(M);
  let sign=F1;
  let pivotRow=0;

  steps.push(step(
    `${makeStepNum(1)}<span>初始矩阵</span>`,
    dispMatrix(m)
  ));

  // Special: 1x1
  if(n===1)return{steps,value:M[0][0],detStr:M[0][0].toHTML()};

  // For small n use cofactor with display
  if(n<=4){
    const val=detCofactor(M,steps,1);
    return{steps,value:val};
  }

  // Large: row reduction
  for(let col=0;col<n&&pivotRow<n;col++){
    let pRow=-1;
    for(let r=pivotRow;r<n;r++){
      if(!m[r][col].isZero()){pRow=r;break;}
    }
    if(pRow===-1){
      steps.push(step(`${makeStepNum(steps.length+1)}<span>第${col+1}列无主元，行列式 = 0</span>`,''));
      return{steps,value:F(0)};
    }
    if(pRow!==pivotRow){
      [m[pivotRow],m[pRow]]=[m[pRow],m[pivotRow]];
      sign=sign.neg();
      steps.push(step(
        `${makeStepNum(steps.length+1)}<span>交换行，行列式变号</span> <span class="op-badge">R${pivotRow+1} ↔ R${pRow+1}</span>`,
        dispMatrix(m)
      ));
    }
    for(let r=pivotRow+1;r<n;r++){
      if(!m[r][col].isZero()){
        const factor=m[r][col].div(m[pivotRow][col]);
        for(let c=col;c<n;c++)m[r][c]=m[r][c].sub(factor.mul(m[pivotRow][c]));
        steps.push(step(
          `${makeStepNum(steps.length+1)}<span class="op-badge">R${r+1} → R${r+1} − (${factor.toStr()})·R${pivotRow+1}</span>`,
          dispMatrix(m)
        ));
      }
    }
    pivotRow++;
  }
  // Product of diagonal
  let prod=sign;
  for(let i=0;i<n;i++)prod=prod.mul(m[i][i]);
  const diagStr=Array.from({length:n},(_,i)=>m[i][i].toStr()).join(' × ');
  steps.push(step(
    `${makeStepNum(steps.length+1)}<span>上三角矩阵，行列式 = 对角线之积（乘以符号${sign.toStr()}）</span>`,
    `<div style="font-family:'JetBrains Mono',monospace;padding:8px;color:var(--text)">${sign.toStr()} × ${diagStr} = <strong style="color:var(--green)">${prod.toStr()}</strong></div>`
  ));
  return{steps,value:prod};
}

function detCofactor(M,steps,depth){
  const n=M.length;
  if(n===1)return M[0][0];
  if(n===2){
    const d=M[0][0].mul(M[1][1]).sub(M[0][1].mul(M[1][0]));
    const stepNum=steps.length+1;
    steps.push(step(
      `${makeStepNum(stepNum)}<span>2×2行列式展开</span>`,
      `<div style="font-family:'JetBrains Mono',monospace;padding:8px;color:var(--text)">
       ${dispMatrix(M)} = 
       <span style="color:var(--text)">(${M[0][0].toStr()})(${M[1][1].toStr()}) − (${M[0][1].toStr()})(${M[1][0].toStr()}) = </span>
       <strong style="color:var(--green)">${d.toStr()}</strong>
       </div>`
    ));
    return d;
  }
  // Expand along first row
  let result=F(0);
  let expansion='';
  for(let j=0;j<n;j++){
    if(M[0][j].isZero())continue;
    const cofactorM=M.slice(1).map(row=>[...row.slice(0,j),...row.slice(j+1)]);
    const cofactorVal=detCofactor(cofactorM,[],depth+1);
    const s=j%2===0?F(1):F(-1);
    result=result.add(s.mul(M[0][j]).mul(cofactorVal));
    const sign=j%2===0?'+':'-';
    expansion+=`${sign}(${M[0][j].toStr()})(${cofactorVal.toStr()}) `;
  }
  const stepNum=steps.length+1;
  steps.push(step(
    `${makeStepNum(stepNum)}<span>按第1行展开</span>`,
    `<div style="font-family:'JetBrains Mono',monospace;padding:8px;color:var(--text)">
     ${dispMatrix(M)} <br>
     <span style="color:var(--text2)">= ${expansion.trim()}</span><br>
     = <strong style="color:var(--green)">${result.toStr()}</strong></div>`
  ));
  return result;
}

// ============================================================
// MATRIX INVERSE (Gauss-Jordan)
// ============================================================
function matInverse(M){
  const n=M.length;
  if(n!==M[0].length)return{err:'矩阵必须为方阵'};
  const steps=[];
  // Augment [M|I]
  let aug=appendRight(cloneMatrix(M),identity(n));
  steps.push(step(
    `${makeStepNum(1)}<span>构造增广矩阵 [A | I]</span>`,
    dispMatrix(aug,[],n)
  ));
  let pivotRow=0;
  const pivots=[];
  for(let col=0;col<n&&pivotRow<n;col++){
    let pRow=-1;
    for(let r=pivotRow;r<n;r++){
      if(!aug[r][col].isZero()){pRow=r;break;}
    }
    if(pRow===-1){
      return{steps,err:'矩阵不可逆（奇异矩阵）'};
    }
    pivots.push([pivotRow,col]);
    if(pRow!==pivotRow){
      [aug[pivotRow],aug[pRow]]=[aug[pRow],aug[pivotRow]];
      steps.push(step(
        `${makeStepNum(steps.length+1)}<span class="op-badge">R${pivotRow+1} ↔ R${pRow+1}</span>`,
        dispMatrix(aug,[],n)
      ));
    }
    const pv=aug[pivotRow][col];
    if(!pv.eq(F1)){
      const inv=F1.div(pv);
      for(let c=0;c<2*n;c++)aug[pivotRow][c]=inv.mul(aug[pivotRow][c]);
      steps.push(step(
        `${makeStepNum(steps.length+1)}<span class="op-badge">R${pivotRow+1} → (${inv.toStr()})·R${pivotRow+1}</span>`,
        dispMatrix(aug,pivots,n)
      ));
    }
    for(let r=0;r<n;r++){
      if(r!==pivotRow&&!aug[r][col].isZero()){
        const fac=aug[r][col];
        for(let c=0;c<2*n;c++)aug[r][c]=aug[r][c].sub(fac.mul(aug[pivotRow][c]));
        steps.push(step(
          `${makeStepNum(steps.length+1)}<span class="op-badge">R${r+1} → R${r+1} − (${fac.toStr()})·R${pivotRow+1}</span>`,
          dispMatrix(aug,pivots,n)
        ));
      }
    }
    pivotRow++;
  }
  const inv=sliceCols(aug,n,2*n);
  steps.push(step(
    `${makeStepNum(steps.length+1)}<span>左侧已化为单位矩阵，右侧即为 A⁻¹</span>`,
    `${dispMatrix(aug,[],n)}`
  ));
  return{steps,result:inv};
}

// ============================================================
// LINEAR SYSTEMS
// ============================================================
function solveLinearSystem(A, b, homogeneous=false){
  const steps=[];
  const m=A.length, n=A[0].length;
  // Build augmented [A|b]
  let aug=A.map((row,i)=>[...row.map(v=>Frac.from(v)),Frac.from(b[i])]);
  steps.push(step(
    `${makeStepNum(1)}<span>写出增广矩阵 [A | b]</span>`,
    dispMatrix(aug,[],n)
  ));

  // Gaussian elim
  let {result:ref,steps:gSteps,pivots}=gaussianElim(aug,true);
  // Adjust step numbers
  let stepIdx=steps.length+1;
  gSteps.forEach(s=>{
    steps.push(s.replace(/"step-num">\d+/,(m)=>`"step-num">${stepIdx++}`));
  });
  let aug2=ref;

  // Check consistency
  const rankA=pivots.length;
  // Check if any pivot in last column (n-th, 0-indexed)
  let inconsistent=false;
  for(let r=0;r<m;r++){
    let allZero=true;
    for(let c=0;c<n;c++)if(!aug2[r][c].isZero()){allZero=false;break;}
    if(allZero&&!aug2[r][n].isZero()){inconsistent=true;break;}
  }
  if(inconsistent){
    steps.push(`<div class="info-box error">方程组无解（矩阵的秩 rank(A) ≠ rank(A|b)）</div>`);
    return{steps,solution:'无解'};
  }

  // Further reduce to RREF
  let pivotRow2=0;
  const pivots2=[];
  for(let col=0;col<n&&pivotRow2<m;col++){
    let pRow=-1;
    for(let r=pivotRow2;r<m;r++){
      if(!aug2[r][col].isZero()){pRow=r;break;}
    }
    if(pRow===-1)continue;
    pivots2.push([pivotRow2,col]);
    if(!aug2[pivotRow2][col].eq(F1)){
      const inv=F1.div(aug2[pivotRow2][col]);
      for(let c=col;c<=n;c++)aug2[pivotRow2][c]=inv.mul(aug2[pivotRow2][c]);
      steps.push(step(
        `${makeStepNum(stepIdx++)}<span class="op-badge">R${pivotRow2+1} → (${inv.toStr()})·R${pivotRow2+1}</span>`,
        dispMatrix(aug2,[],n)
      ));
    }
    for(let r=0;r<m;r++){
      if(r!==pivotRow2&&!aug2[r][col].isZero()){
        const fac=aug2[r][col];
        for(let c=0;c<=n;c++)aug2[r][c]=aug2[r][c].sub(fac.mul(aug2[pivotRow2][c]));
        steps.push(step(
          `${makeStepNum(stepIdx++)}<span class="op-badge">R${r+1} → R${r+1} − (${fac.toStr()})·R${pivotRow2+1}</span>`,
          dispMatrix(aug2,[],n)
        ));
      }
    }
    pivotRow2++;
  }

  // Identify pivot and free variables
  const pivotCols=pivots2.map(p=>p[1]);
  const freeCols=Array.from({length:n},(_,i)=>i).filter(i=>!pivotCols.includes(i));
  const rankA2=pivots2.length;
  const freeCount=n-rankA2;

  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>最终最简形 (RREF)</span>`,
    dispMatrix(aug2,pivots2,n)
  ));

  if(freeCount===0){
    // Unique solution
    const sol=Array.from({length:n},(_,i)=>{
      const pIdx=pivotCols.indexOf(i);
      if(pIdx>=0)return aug2[pIdx][n];
      return F(0);
    });
    const solHTML=buildSolHTML(sol,[],[],pivotCols,freeCols,aug2,n);
    steps.push(step(
      `${makeStepNum(stepIdx++)}<span>唯一解</span>`,
      solHTML
    ));
    return{steps,solution:'唯一解',sol};
  }else{
    // Infinitely many solutions
    const solHTML=buildGeneralSolHTML(pivotCols,freeCols,aug2,n,homogeneous);
    steps.push(step(
      `${makeStepNum(stepIdx++)}<span>通解（含 ${freeCount} 个自由变量）</span>`,
      solHTML
    ));
    return{steps,solution:'无穷多解',freeCount};
  }
}

function buildSolHTML(sol,_,__,___,____,_____,n){
  let html='<div class="eq-display">';
  sol.forEach((v,i)=>{
    html+=`<div><span class="eq-var">x<sub>${i+1}</sub></span> = <span class="eq-result">${v.toHTML()}</span></div>`;
  });
  html+='</div>';
  return html;
}

function buildGeneralSolHTML(pivotCols,freeCols,aug,n,homogeneous){
  // Express pivot vars in terms of free vars
  const m=aug.length;
  let html='<div class="eq-display">';
  // Special solution (particular solution) + null space basis
  // First show the equations
  const freeLabels=freeCols.map((c,i)=>String.fromCharCode(99+i)); // c,d,e...

  html+=`<div style="color:var(--text2);font-size:.82rem;margin-bottom:8px">设自由变量：`;
  freeCols.forEach((c,i)=>{
    html+=`<span class="eq-var">x<sub>${c+1}</sub></span> = <span style="color:var(--purple)">${freeLabels[i]}</span>　`;
  });
  html+='</div>';

  // Express pivot variables
  pivotCols.forEach((c,pIdx)=>{
    const row=aug[pIdx];
    html+=`<div><span class="eq-var">x<sub>${c+1}</sub></span> = `;
    const b=row[n];
    let terms=[];
    if(!b.isZero())terms.push(`<span class="eq-result">${b.toHTML()}</span>`);
    freeCols.forEach((fc,fi)=>{
      const coeff=row[fc].neg();
      if(!coeff.isZero()){
        terms.push(`(${coeff.toHTML()})<span class="eq-var">${freeLabels[fi]}</span>`);
      }
    });
    html+=(terms.length?terms.join(' + '):'0')+'</div>';
  });

  // Build vectors
  if(!homogeneous){
    html+='<div style="margin-top:12px;color:var(--text2);font-size:.82rem">通解形式：<strong style="color:var(--text)">x = x* + k₁ξ₁ + k₂ξ₂ + ···</strong></div>';
    // Particular solution
    const xStar=Array.from({length:n},(_,i)=>{
      const pIdx=pivotCols.indexOf(i);
      if(pIdx>=0)return aug[pIdx][n];
      return F(0);
    });
    html+='<div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:8px">';
    html+='<span style="color:var(--text2)">特解 x* = </span>';
    html+=dispVector(xStar);
    html+='</div>';
  }

  // Null space basis vectors
  if(freeCols.length>0){
    html+='<div style="margin-top:10px;color:var(--text2);font-size:.82rem">基础解系（零空间基）：</div>';
    html+='<div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-top:6px">';
    freeCols.forEach((fc,fi)=>{
      const xi=Array.from({length:n},(_,i)=>{
        if(i===fc)return F(1);
        const pIdx=pivotCols.indexOf(i);
        if(pIdx>=0)return aug[pIdx][fc].neg();
        return F(0);
      });
      html+=`<div style="display:flex;align-items:center;gap:4px"><span style="color:var(--purple)">ξ${fi+1} = </span>${dispVector(xi)}</div>`;
    });
    html+='</div>';
  }
  html+='</div>';
  return html;
}

function charPolyCoeffs(A){
  const n=A.length;
  // Use numerical computation
  const Af=A.map(row=>row.map(v=>v instanceof Frac?v.toFloat():v));
  // Characteristic polynomial: det(λI - A)
  // We'll compute it numerically using Faddeev-LeVerrier algorithm
  // p(λ) = λ^n + c_{n-1}λ^{n-1} + ... + c_0
  const coeffs=Array(n+1).fill(0);
  coeffs[n]=1;
  
  // Evaluate at multiple points and interpolate (simple approach for small n)
  // Better: direct computation
  
  // For n<=3, compute directly
  if(n===1){
    return [1, -Af[0][0]];
  }
  if(n===2){
    const tr=Af[0][0]+Af[1][1];
    const d=Af[0][0]*Af[1][1]-Af[0][1]*Af[1][0];
    return [1,-tr,d];
  }
  if(n===3){
    const [[a,b,c],[d,e,f],[g,h,k]]=Af;
    const tr=a+e+k;
    const m11=e*k-f*h, m22=a*k-c*g, m33=a*e-b*d;
    const sum_minors2=m11+m22+m33;
    const det3=a*(e*k-f*h)-b*(d*k-f*g)+c*(d*h-e*g);
    return [1,-tr,sum_minors2,-det3];
  }
  // General: evaluate char poly at n+1 points
  // p(λ) = det(λI - A)
  // Use points 0,1,2,...,n and Lagrange interpolation
  const pts=[];
  for(let i=0;i<=n;i++){
    const lam=i*(n+1); // spread out points
    // compute det(lam*I - A)
    const M=Af.map((row,ri)=>row.map((v,ci)=>(ri===ci?lam:0)-v));
    pts.push([lam,detFloat(M)]);
  }
  // Lagrange interpolation for coefficients
  return charPolyFromPoints(pts, n);
}

function charPolyFromPoints(pts,n){
  // Use Vandermonde
  const xs=pts.map(p=>p[0]);
  const ys=pts.map(p=>p[1]);
  // Build Vandermonde matrix and solve
  // coeffs[0] = leading (x^n term)
  const coeffs=Array(n+1).fill(0);
  // Lagrange interpolation
  for(let i=0;i<=n;i++){
    let L=1;
    for(let j=0;j<=n;j++)if(j!==i)L*=(xs[i]-xs[j]);
    // Add yi/L * product(λ - xj) j≠i to polynomial
    // This is complex; use Newton's method instead
    // Actually let me just evaluate characteristic polynomial differently
  }
  // Fallback: use numerical eigenvalues and reconstruct
  return [1,0,0,0]; // placeholder
}

function detFloat(M){
  const n=M.length;
  let m=M.map(r=>[...r]);
  let sign=1;
  for(let col=0;col<n;col++){
    let pRow=-1;
    for(let r=col;r<n;r++){if(Math.abs(m[r][col])>1e-12){pRow=r;break;}}
    if(pRow===-1)return 0;
    if(pRow!==col){[m[col],m[pRow]]=[m[pRow],m[col]];sign*=-1;}
    for(let r=col+1;r<n;r++){
      const fac=m[r][col]/m[col][col];
      for(let c=col;c<n;c++)m[r][c]-=fac*m[col][c];
    }
  }
  let det=sign;
  for(let i=0;i<n;i++)det*=m[i][i];
  return det;
}

function evalCharPoly(A, lambda){
  const n=A.length;
  const Af=A.map(r=>r.map(v=>v instanceof Frac?v.toFloat():v));
  const M=Af.map((row,i)=>row.map((v,j)=>(i===j?lambda:0)-v));
  return detFloat(M);
}

function findEigenvalues(A){
  const n=A.length;
  const Af=A.map(r=>r.map(v=>v instanceof Frac?v.toFloat():v));
  
  // Use QR algorithm (simplified) to find eigenvalues numerically
  let H=deepCopyMatrix(Af);
  
  // Hessenberg reduction (simplified)
  H=qrIteration(H,200);
  
  // Extract eigenvalues from diagonal
  const eigenvals=[];
  let i=0;
  while(i<n){
    if(i===n-1||Math.abs(H[i+1][i])<1e-8){
      eigenvals.push(H[i][i]);
      i++;
    }else{
      // 2x2 block
      const a=H[i][i],b=H[i][i+1],c=H[i+1][i],d=H[i+1][i+1];
      const tr=a+d;
      const det=a*d-b*c;
      const disc=tr*tr-4*det;
      if(disc>=0){
        eigenvals.push((tr+Math.sqrt(disc))/2);
        eigenvals.push((tr-Math.sqrt(disc))/2);
      }else{
        // Complex eigenvalues
        eigenvals.push((tr+Math.sqrt(-disc))/2); // just real part for display
        eigenvals.push((tr-Math.sqrt(-disc))/2);
      }
      i+=2;
    }
  }
  
  // Snap to rational numbers
  return eigenvals.map(snapToRational);
}

function snapToRational(v){
  // Try to snap to fraction with small denominator
  for(let d=1;d<=24;d++){
    const n=Math.round(v*d);
    if(Math.abs(n/d-v)<1e-6)return n/d;
  }
  return v;
}

function deepCopyMatrix(M){
  return M.map(r=>[...r]);
}

function qrIteration(A,maxIter){
  let H=deepCopyMatrix(A);
  const n=H.length;
  for(let iter=0;iter<maxIter;iter++){
    const [Q,R]=qrDecompose(H);
    H=matMulFloat(R,Q);
    // Check convergence
    let off=0;
    for(let i=1;i<n;i++)for(let j=0;j<i;j++)off+=H[i][j]*H[i][j];
    if(off<1e-16)break;
  }
  return H;
}

function qrDecompose(A){
  const m=A.length,n=A[0].length;
  let Q=identity(m).map(r=>r.map(v=>v.toFloat()));
  let R=deepCopyMatrix(A);
  for(let j=0;j<Math.min(m,n);j++){
    const x=Array.from({length:m-j},(_,i)=>R[i+j][j]);
    const norm=Math.sqrt(x.reduce((s,v)=>s+v*v,0));
    if(norm<1e-14)continue;
    const v=[...x];
    v[0]+=Math.sign(x[0]||1)*norm;
    const vn=Math.sqrt(v.reduce((s,e)=>s+e*e,0));
    if(vn<1e-14)continue;
    const u=v.map(e=>e/vn);
    // Apply Householder
    for(let jj=j;jj<n;jj++){
      let dot=0;
      for(let i=0;i<u.length;i++)dot+=u[i]*R[i+j][jj];
      dot*=2;
      for(let i=0;i<u.length;i++)R[i+j][jj]-=dot*u[i];
    }
    for(let jj=0;jj<m;jj++){
      let dot=0;
      for(let i=0;i<u.length;i++)dot+=u[i]*Q[i+j][jj];
      dot*=2;
      for(let i=0;i<u.length;i++)Q[i+j][jj]-=dot*u[i];
    }
  }
  // Q = Q^T from above
  const Qt=Array.from({length:m},(_,i)=>Array.from({length:m},(_,j)=>Q[j][i]));
  return[Qt,R];
}

function matMulFloat(A,B){
  const r=A.length,m=B.length,c=B[0].length;
  return Array.from({length:r},(_,i)=>Array.from({length:c},(_,j)=>{
    let s=0;for(let k=0;k<m;k++)s+=A[i][k]*B[k][j];return s;
  }));
}

function nullSpaceFloat(A, lambda=0){
  // Find null space of (A - lambda*I)
  const n=A.length;
  const Af=A.map((r,i)=>r.map((v,j)=>(v instanceof Frac?v.toFloat():v)-(i===j?lambda:0)));
  // Gaussian elimination on Af
  let M=deepCopyMatrix(Af);
  const pivotCols=[];
  let pivotRow=0;
  for(let col=0;col<n&&pivotRow<n;col++){
    let pRow=-1;
    let maxVal=1e-8;
    for(let r=pivotRow;r<n;r++){
      if(Math.abs(M[r][col])>maxVal){maxVal=Math.abs(M[r][col]);pRow=r;}
    }
    if(pRow===-1)continue;
    pivotCols.push(col);
    [M[pivotRow],M[pRow]]=[M[pRow],M[pivotRow]];
    const pv=M[pivotRow][col];
    for(let c=col;c<n;c++)M[pivotRow][c]/=pv;
    for(let r=0;r<n;r++){
      if(r!==pivotRow&&Math.abs(M[r][col])>1e-12){
        const fac=M[r][col];
        for(let c=0;c<n;c++)M[r][c]-=fac*M[pivotRow][c];
      }
    }
    pivotRow++;
  }
  const freeCols=Array.from({length:n},(_,i)=>i).filter(i=>!pivotCols.includes(i));
  // Build null space basis
  return freeCols.map(fc=>{
    const v=Array(n).fill(0);
    v[fc]=1;
    pivotCols.forEach((pc,pi)=>{v[pc]=-M[pi][fc];});
    // normalize
    const norm=Math.sqrt(v.reduce((s,e)=>s+e*e,0));
    return norm>1e-12?v.map(e=>e/norm):v;
  });
}

function gramSchmidt(vecs){
  const result=[];
  for(const v of vecs){
    let u=[...v];
    for(const q of result){
      const dot=u.reduce((s,e,i)=>s+e*q[i],0);
      for(let i=0;i<u.length;i++)u[i]-=dot*q[i];
    }
    const norm=Math.sqrt(u.reduce((s,e)=>s+e*e,0));
    if(norm>1e-12)result.push(u.map(e=>e/norm));
  }
  return result;
}

function fmtFloat(v,dec=4){
  const r=Math.round(v*1e8)/1e8;
  if(Math.abs(r)<1e-10)return '0';
  // Try to snap to simple fraction
  for(let d=1;d<=24;d++){
    const n=Math.round(r*d);
    if(Math.abs(n/d-r)<1e-6){
      if(d===1)return String(n);
      // format as fraction
      return `<span class="frac-disp"><span class="fn">${n<0?n:n}</span><span class="fd">${d}</span></span>`;
    }
  }
  return r.toFixed(dec).replace(/\.?0+$/,'');
}

function fmtFloatStr(v){
  const r=Math.round(v*1e8)/1e8;
  if(Math.abs(r)<1e-10)return '0';
  for(let d=1;d<=24;d++){
    const n=Math.round(r*d);
    if(Math.abs(n/d-r)<1e-6){
      if(d===1)return String(n);
      return `${n}/${d}`;
    }
  }
  return r.toFixed(4).replace(/\.?0+$/,'');
}

// Method 1: Completing the Square (配方法)
function qfCompletingSquare(A){
  const n=A.length;
  const steps=[];
  let C=cloneMatrix(A); // working copy of the symmetric matrix
  const vars=Array.from({length:n},(_,i)=>`x<sub>${i+1}</sub>`);
  const subsList=[]; // list of {from, to} variable substitutions
  let stepIdx=1;

  // Display initial quadratic form
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>初始二次型矩阵</span>`,
    dispMatrix(C)+`<div style="margin-top:8px;color:var(--text2);font-size:.85rem">二次型 f = ${qfToString(C,vars)}</div>`
  ));

  // Work on submatrix, tracking variable substitutions
  const diagCoeffs=[]; // will hold the standard form coefficients
  
  function processBlock(matrix,startIdx,currentVars){
    const size=n-startIdx;
    if(size===0)return matrix;
    if(size===1){
      diagCoeffs.push({coeff:matrix[startIdx][startIdx],varIdx:startIdx});
      return matrix;
    }
    
    let m=matrix;
    let ci=startIdx;
    
    // Check if pivot exists
    if(!m[ci][ci].isZero()){
      // Standard case: complete the square in variable ci
      const aii=m[ci][ci];
      // New var: y_{ci} = x_{ci} + sum_{j>ci} (a_{ci,j}/a_{ci,ci}) x_j
      const sub={from:ci,coeffs:[]};
      for(let j=ci+1;j<n;j++){
        sub.coeffs.push({j,coeff:m[ci][j].div(aii)});
      }
      subsList.push(sub);
      
      // Compute new matrix after completing square
      const newM=cloneMatrix(m);
      // The term becomes a_{ci,ci} * y_{ci}^2
      // Remaining: subtract a_{ci,ci} * (sum coeff_j x_j)^2
      for(let j=ci+1;j<n;j++){
        for(let k=ci+1;k<n;k++){
          const adj=m[ci][j].mul(m[ci][k]).div(aii);
          newM[j][k]=newM[j][k].sub(adj);
          newM[k][j]=newM[j][k]; // keep symmetric
        }
      }
      // Zero out row/col ci
      for(let j=0;j<n;j++){newM[ci][j]=F(0);newM[j][ci]=F(0);}
      
      const subStr=buildSubStr(sub,ci,currentVars);
      steps.push(step(
        `${makeStepNum(stepIdx++)}<span>对 x<sub>${ci+1}</sub> 配方</span>`,
        `<div class="eq-display">令 <span class="eq-var">${currentVars[ci]}</span> = ${subStr}</div>
         <div style="margin-top:6px;color:var(--text2);font-size:.82rem">
         配方后二次型包含项：<span style="color:var(--accent)">${aii.toHTML()} · (新变量)<sup>2</sup></span>
         </div>`
      ));
      diagCoeffs.push({coeff:aii,varIdx:ci});
      return processBlock(newM,ci+1,currentVars);
    }else{
      // Check if there's an off-diagonal non-zero element
      let found=false;
      for(let j=ci+1;j<n&&!found;j++){
        if(!m[ci][j].isZero()){
          // Make substitution: replace x_ci with x_ci+x_j, x_j with x_ci-x_j
          steps.push(step(
            `${makeStepNum(stepIdx++)}<span>对角线 a<sub>${ci+1},${ci+1}</sub>=0，进行辅助换元</span>`,
            `<div class="eq-display">令 <span class="eq-var">x<sub>${ci+1}</sub></span> = u + v, <span class="eq-var">x<sub>${j+1}</sub></span> = u − v</div>`
          ));
          const newM=cloneMatrix(m);
          // Recompute: expand with new variables
          // After substitution, the new (ci,ci) entry will be 2*m[ci][j]
          // Simplified: set a_{ci,ci} = 2*m[ci][j], modify other entries
          newM[ci][ci]=m[ci][j].mul(F(2));
          newM[j][j]=m[ci][j].neg().mul(F(2));
          // This is an approximation; in practice we'd re-expand
          found=true;
          return processBlock(newM,ci,currentVars);
        }
      }
      if(!found){
        // All entries in this row/col are zero
        diagCoeffs.push({coeff:F(0),varIdx:ci});
        return processBlock(m,ci+1,currentVars);
      }
    }
    return m;
  }
  
  processBlock(C,0,vars);
  
  // Build standard form display
  let stdForm='<div class="eq-display">f = ';
  const nonZero=diagCoeffs.filter(d=>!d.coeff.isZero());
  if(nonZero.length===0){
    stdForm+='0';
  }else{
    nonZero.forEach((d,i)=>{
      if(i>0&&!d.coeff.lt(F(0)))stdForm+=' + ';
      stdForm+=`${d.coeff.toHTML()} · <span class="eq-var">y<sub>${d.varIdx+1}</sub><sup>2</sup></span>`;
    });
  }
  stdForm+='</div>';
  
  const pos=diagCoeffs.filter(d=>d.coeff.gt(F(0))).length;
  const neg2=diagCoeffs.filter(d=>d.coeff.lt(F(0))).length;
  const zero=diagCoeffs.filter(d=>d.coeff.isZero()).length;
  
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>标准型</span>`,
    stdForm+`<div class="info-box success" style="margin-top:8px">
    正惯性指数 p = ${pos}，负惯性指数 q = ${neg2}，秩 r = ${pos+neg2}
    </div>`
  ));
  
  return{steps};
}

function buildSubStr(sub,ci,vars){
  let s=`<span class="eq-var">${vars[ci]}</span>`;
  sub.coeffs.forEach(({j,coeff})=>{
    if(!coeff.isZero()){
      const cs=coeff.toStr();
      if(coeff.gt&&coeff.gt(F(0))) s+=` − ${coeff.toHTML()}·${vars[j]}`;
      else s+=` + ${coeff.neg().toHTML()}·${vars[j]}`;
    }
  });
  return s;
}

function qfToString(A,vars){
  const n=A.length;
  let terms=[];
  for(let i=0;i<n;i++){
    for(let j=i;j<n;j++){
      const a=A[i][j];
      if(a.isZero())continue;
      if(i===j){
        terms.push(`${a.toHTML()}·${vars[i]}<sup>2</sup>`);
      }else{
        const coeff=a.mul(F(2));
        terms.push(`${coeff.toHTML()}·${vars[i]}${vars[j]}`);
      }
    }
  }
  return terms.length?terms.join(' + '):'0';
}

// Method 2: Congruence Transform (合同变换法)
function qfCongruence(A){
  const n=A.length;
  const steps=[];
  let stepIdx=1;
  // Work on [A; I] simultaneously applying congruence transforms
  // Top block: A (will become Λ)
  // Bottom block: C^T (column operations tracker, starts as I)
  let topA=cloneMatrix(A);
  let C=identity(n); // Column transform matrix (C)
  
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>初始矩阵与变换矩阵</span>`,
    `<div style="font-size:.82rem;color:var(--text2);margin-bottom:6px">对 [A] 同时进行行变换和对应列变换，下方跟踪列变换矩阵 C</div>
     ${dispMatrix(topA)}<div style="margin-top:6px;color:var(--text2);font-size:.82rem">C = </div>${dispMatrix(C)}`
  ));
  
  for(let i=0;i<n;i++){
    // Find pivot
    if(topA[i][i].isZero()){
      // Look for nonzero off-diagonal
      let found=false;
      for(let j=i+1;j<n&&!found;j++){
        if(!topA[i][j].isZero()){
          // Add col j to col i, and add row j to row i
          // Column operation: C_i → C_i + C_j
          for(let r=0;r<n;r++){
            topA[r][i]=topA[r][i].add(topA[r][j]);
            C[r][i]=C[r][i].add(C[r][j]);
          }
          // Row operation: R_i → R_i + R_j  
          for(let c=0;c<n;c++){
            topA[i][c]=topA[i][c].add(topA[j][c]);
          }
          steps.push(step(
            `${makeStepNum(stepIdx++)}<span>对角线为0，辅助操作：C${i+1} = C${i+1}+C${j+1}，R${i+1} = R${i+1}+R${j+1}</span>`,
            dispMatrix(topA)+`<div style="margin-top:6px;color:var(--text2);font-size:.82rem">C =</div>`+dispMatrix(C)
          ));
          found=true;
        }
      }
      if(!found)continue; // zero row/col, skip
    }
    
    // Now topA[i][i] should be non-zero
    if(topA[i][i].isZero())continue;
    
    const piv=topA[i][i];
    // Eliminate off-diagonal in row/col i
    for(let j=i+1;j<n;j++){
      if(!topA[i][j].isZero()){
        const factor=topA[i][j].div(piv);
        // Column operation: C_j → C_j - factor*C_i
        for(let r=0;r<n;r++){
          topA[r][j]=topA[r][j].sub(factor.mul(topA[r][i]));
          C[r][j]=C[r][j].sub(factor.mul(C[r][i]));
        }
        // Corresponding row operation: R_j → R_j - factor*R_i
        for(let c=0;c<n;c++){
          topA[j][c]=topA[j][c].sub(factor.mul(topA[i][c]));
        }
        steps.push(step(
          `${makeStepNum(stepIdx++)}<span>消去第${i+1}行/列的非对角元</span><span class="op-badge">C${j+1}→C${j+1}−(${factor.toStr()})C${i+1}, R${j+1}→R${j+1}−(${factor.toStr()})R${i+1}</span>`,
          dispMatrix(topA)+`<div style="margin-top:6px;color:var(--text2);font-size:.82rem">C =</div>`+dispMatrix(C)
        ));
      }
    }
  }
  
  // Final result
  const diagVals=Array.from({length:n},(_,i)=>topA[i][i]);
  const pos=diagVals.filter(v=>v.gt(F(0))).length;
  const neg2=diagVals.filter(v=>v.lt(F(0))).length;
  
  let stdForm='<div class="eq-display">f = ';
  const terms=diagVals.map((v,i)=>({v,i})).filter(d=>!d.v.isZero());
  terms.forEach((d,idx)=>{
    if(idx>0&&!d.v.lt(F(0)))stdForm+=' + ';
    stdForm+=`${d.v.toHTML()}·<span class="eq-var">y<sub>${d.i+1}</sub><sup>2</sup></span>`;
  });
  stdForm+=(terms.length?'':'0')+'</div>';
  
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>标准型（对角矩阵 Λ = C<sup>T</sup>AC）</span>`,
    `${dispMatrix(topA)}<br>
     <div style="margin-top:8px;color:var(--text2);font-size:.82rem">变换矩阵 C：</div>
     ${dispMatrix(C)}<br>
     ${stdForm}
     <div class="info-box success" style="margin-top:8px">
     正惯性指数 p = ${pos}，负惯性指数 q = ${neg2}
     </div>`
  ));
  return{steps};
}

// Method 3: Orthogonal Transform (正交变换法)
function qfOrthogonal(A){
  const n=A.length;
  const steps=[];
  let stepIdx=1;
  const Af=A.map(r=>r.map(v=>v.toFloat()));
  
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>初始对称矩阵</span>`,
    dispMatrix(A)
  ));
  
  // Find eigenvalues
  const eigenvals=findEigenvalues(A);
  // Group and sort
  const unique=[];
  eigenvals.forEach(e=>{
    if(!unique.some(u=>Math.abs(u-e)<1e-6))unique.push(e);
  });
  unique.sort((a,b)=>a-b);
  
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>求特征多项式 det(λI − A) 的根（特征值）</span>`,
    `<table class="eigen-table">
      <tr><th>特征值 λ</th><th>重数</th></tr>
      ${unique.map(e=>{
        const mult=eigenvals.filter(v=>Math.abs(v-e)<1e-6).length;
        return `<tr><td style="color:var(--accent)">${fmtFloat(e)}</td><td>${mult}</td></tr>`;
      }).join('')}
    </table>`
  ));
  
  // Find eigenvectors for each eigenvalue
  const allVecs=[];
  const eigGroups=[];
  unique.forEach(lambda=>{
    const vecs=nullSpaceFloat(Af,lambda);
    // Gram-Schmidt orthonormalization
    const orth=gramSchmidt(vecs);
    eigGroups.push({lambda,vecs:orth});
    orth.forEach(v=>allVecs.push({lambda,vec:v}));
    
    steps.push(step(
      `${makeStepNum(stepIdx++)}<span>λ = ${fmtFloat(lambda)} 的特征向量</span>`,
      `<div style="font-size:.83rem;color:var(--text2);margin-bottom:6px">解方程组 (λI−A)x=0，特征向量（已单位化）：</div>
       <div style="display:flex;flex-wrap:wrap;gap:10px">
       ${orth.map((v,i)=>`<div style="display:flex;align-items:center;gap:4px">
         <span style="color:var(--purple)">ξ${i+1}=</span>
         ${dispFloatMatrix(v.map(e=>[e]))}
       </div>`).join('')}
       </div>`
    ));
  });
  
  // Build orthogonal matrix P
  const P=allVecs.map(e=>e.vec);
  
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>构造正交矩阵 P（列为标准化特征向量）</span>`,
    dispFloatMatrix(transposeFloat(P))+
    `<div style="font-size:.82rem;color:var(--text2);margin-top:6px">P<sup>T</sup>AP = diag(${allVecs.map(e=>fmtFloatStr(e.lambda)).join(', ')})</div>`
  ));
  
  // Standard form
  let stdForm='<div class="eq-display">f = ';
  allVecs.forEach((e,i)=>{
    if(i>0&&e.lambda>=-1e-10)stdForm+=' + ';
    stdForm+=`${fmtFloat(e.lambda)}·<span class="eq-var">y<sub>${i+1}</sub><sup>2</sup></span>`;
  });
  stdForm+='</div>';
  
  const pos=allVecs.filter(e=>e.lambda>1e-8).length;
  const neg2=allVecs.filter(e=>e.lambda<-1e-8).length;
  
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>标准型</span>`,
    stdForm+`<div class="info-box success" style="margin-top:8px">
    正惯性指数 p = ${pos}，负惯性指数 q = ${neg2}
    <br>正定性：${pos===n?'正定矩阵 ✓':neg2===n?'负定矩阵':pos+neg2===n?'不定矩阵':'半正定'}
    </div>`
  ));
  
  return{steps};
}

function transposeFloat(M){
  if(!M.length)return[];
  const r=M.length,c=M[0].length;
  return Array.from({length:c},(_,j)=>Array.from({length:r},(_,i)=>M[i][j]));
}

// ============================================================
// DIAGONALIZATION
// ============================================================
function diagonalize(A){
  const n=A.length;
  const steps=[];
  let stepIdx=1;
  const Af=A.map(r=>r.map(v=>v.toFloat()));
  
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>待对角化矩阵 A</span>`,
    dispMatrix(A)
  ));
  
  // Find eigenvalues
  const eigenvals=findEigenvalues(A);
  const unique=[];
  eigenvals.forEach(e=>{
    if(!unique.some(u=>Math.abs(u-e)<1e-6))unique.push(e);
  });
  unique.sort((a,b)=>a-b);
  
  // Characteristic polynomial display
  let charStr='λ';
  if(n===2){
    const tr=Af[0][0]+Af[1][1];
    const d=Af[0][0]*Af[1][1]-Af[0][1]*Af[1][0];
    charStr=`λ² − ${fmtFloatStr(tr)}λ + ${fmtFloatStr(d)}`;
  }else if(n===3){
    const tr=Af[0][0]+Af[1][1]+Af[2][2];
    const d=-detFloat(Af);
    charStr=`λ³ − ${fmtFloatStr(tr)}λ² + ... + ${fmtFloatStr(-d)}`;
  }
  
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>求特征多项式 det(λI − A) = 0</span>`,
    `<div class="eq-display">特征多项式: <span style="color:var(--accent)">${charStr} = 0</span></div>
     <table class="eigen-table" style="margin-top:8px">
       <tr><th>特征值 λ</th><th>代数重数</th><th>几何重数</th></tr>
       ${unique.map(e=>{
         const am=eigenvals.filter(v=>Math.abs(v-e)<1e-6).length;
         const gm=nullSpaceFloat(Af,e).length;
         return`<tr><td style="color:var(--accent)">${fmtFloat(e)}</td><td>${am}</td><td>${gm}</td></tr>`;
       }).join('')}
     </table>`
  ));
  
  // Check diagonalizability
  let diagonalizable=true;
  const eigVecsList=[];
  unique.forEach(lambda=>{
    const am=eigenvals.filter(v=>Math.abs(v-lambda)<1e-6).length;
    const vecs=nullSpaceFloat(Af,lambda);
    const gm=vecs.length;
    if(am!==gm)diagonalizable=false;
    eigVecsList.push({lambda,vecs});
    
    // Show eigenvectors
    const Asub=Af.map((r,i)=>r.map((v,j)=>v-(i===j?lambda:0)));
    const AsubF=matFromFloat(Asub);
    const augF=appendRight(AsubF,identity(n).map(r=>r.map(()=>F(0))).map((r,i)=>r.map(()=>F(0))));
    // Just solve (λI-A)x = 0
    const bVec=Array(n).fill(F(0));
    const AlamF=A.map((r,i)=>r.map((v,j)=>Frac.from(v).sub(i===j?F(Math.round(lambda*1000),1000):F(0))));
    
    steps.push(step(
      `${makeStepNum(stepIdx++)}<span>λ = ${fmtFloat(lambda)} 的特征向量（解 (λI−A)x = 0）</span>`,
      `<div style="display:flex;flex-wrap:wrap;gap:10px">
       ${vecs.map((v,i)=>`<div style="display:flex;align-items:center;gap:4px">
         <span style="color:var(--purple)">p${i+1} = </span>
         ${dispFloatMatrix(v.map(e=>[e]))}
       </div>`).join('')}
       </div>`
    ));
  });
  
  if(!diagonalizable){
    steps.push(`<div class="info-box error">矩阵不可对角化：某特征值的代数重数 ≠ 几何重数</div>`);
    return{steps};
  }
  
  // Build P and Λ
  const allVecs=eigVecsList.flatMap(g=>g.vecs.map(v=>({lambda:g.lambda,vec:v})));
  const Pmat=transposeFloat(allVecs.map(e=>e.vec)); // columns are eigenvectors
  const Lambda=Array.from({length:n},(_,i)=>Array.from({length:n},(_,j)=>i===j?allVecs[i].lambda:0));
  
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>构造矩阵 P（列为特征向量），Λ = P⁻¹AP</span>`,
    `<div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px">
     <div><div style="font-size:.82rem;color:var(--text2);text-align:center">P</div>${dispFloatMatrix(Pmat)}</div>
     <div><div style="font-size:.82rem;color:var(--text2);text-align:center">Λ = diag(${allVecs.map(e=>fmtFloatStr(e.lambda)).join(',')})</div>${dispFloatMatrix(Lambda)}</div>
     </div>
     <div class="info-box success" style="margin-top:8px">P⁻¹AP = Λ（对角阵）✓</div>`
  ));
  
  return{steps};
}

// ============================================================
// P^-1 A P
// ============================================================
function computePinvAP(P,A){
  const steps=[];
  let stepIdx=1;
  steps.push(step(`${makeStepNum(stepIdx++)}<span>计算 P⁻¹</span>`,dispMatrix(P)));
  const invResult=matInverse(P);
  if(invResult.err)return{steps:[...steps,...(invResult.steps||[])],err:invResult.err};
  invResult.steps.forEach(s=>steps.push(s));
  const Pinv=invResult.result;
  steps.push(step(`${makeStepNum(stepIdx++)}<span>P⁻¹ = </span>`,dispMatrix(Pinv)));
  const PA=matMul(Pinv,A);
  steps.push(step(`${makeStepNum(stepIdx++)}<span>计算 P⁻¹A</span>`,dispMatrix(PA)));
  const PAP=matMul(PA,P);
  steps.push(step(`${makeStepNum(stepIdx++)}<span>计算 (P⁻¹A)P = P⁻¹AP</span>`,dispMatrix(PAP)));
  return{steps,result:PAP};
}

// ============================================================
// TRANSITION MATRIX (过渡矩阵)
// ============================================================
function transitionMatrix(B1,B2){
  const steps=[];
  let stepIdx=1;
  const n=B1.length;
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>基1（矩阵 B₁，列为基向量）</span>`,
    dispMatrix(B1)
  ));
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>基2（矩阵 B₂，列为基向量）</span>`,
    dispMatrix(B2)
  ));
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>过渡矩阵 P = B₁⁻¹ · B₂，即满足 B₂ = B₁ · P</span>`,
    `<div style="font-size:.85rem;color:var(--text2)">先求 B₁⁻¹，再乘以 B₂</div>`
  ));
  const invResult=matInverse(B1);
  if(invResult.err)return{steps,err:invResult.err};
  invResult.steps.forEach(s=>steps.push(s));
  const P=matMul(invResult.result,B2);
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>过渡矩阵 P = B₁⁻¹ · B₂</span>`,
    dispMatrix(P)
  ));
  return{steps,result:P};
}

// ============================================================
// POLYNOMIAL OPERATIONS
// ============================================================
class Poly {
  // coeffs: array [a_n, a_{n-1}, ..., a_1, a_0] (highest degree first)
  constructor(coeffs){
    this.coeffs=coeffs.map(Frac.from);
    this.trim();
  }
  trim(){
    while(this.coeffs.length>1&&this.coeffs[0].isZero())this.coeffs.shift();
  }
  degree(){return this.coeffs.length-1;}
  leading(){return this.coeffs[0];}
  isZero(){return this.coeffs.length===1&&this.coeffs[0].isZero();}
  get(i){return i<this.coeffs.length?this.coeffs[i]:F(0);}
  coeff(i){
    // coefficient of x^i
    const idx=this.degree()-i;
    if(idx<0||idx>=this.coeffs.length)return F(0);
    return this.coeffs[idx];
  }
  toHTML(){
    if(this.isZero())return '0';
    const n=this.degree();
    let parts=[];
    for(let i=0;i<=n;i++){
      const c=this.coeffs[i];
      const pow=n-i;
      if(c.isZero())continue;
      let term='';
      if(pow===0){term=c.toHTML();}
      else{
        const absCoeff=c.abs();
        const coeffHTML=absCoeff.eq(F1)?'':`${absCoeff.toHTML()}`;
        const xPart=pow===1?'x':`x<sup>${pow}</sup>`;
        term=coeffHTML+xPart;
      }
      if(parts.length===0){
        if(c.lt(F(0)))parts.push(`<span style="color:var(--red)">−</span>${c.abs().toHTML()===''?'':`${c.abs().toHTML()}`}${pow===0?'':(c.abs().eq(F1)?'':'')+`${pow===1?'x':`x<sup>${pow}</sup>`}`}`);
        else parts.push(term);
      }else{
        if(c.lt(F(0)))parts.push(`<span style="color:var(--text2)"> − </span>${c.neg().eq(F1)&&pow>0?'':`${c.neg().toHTML()}`}${pow===0?'':`${pow===1?'x':`x<sup>${pow}</sup>`}`}`);
        else parts.push(`<span style="color:var(--text2)"> + </span>${term}`);
      }
    }
    return parts.join('');
  }
  toString(){
    if(this.isZero())return '0';
    const n=this.degree();
    let parts=[];
    for(let i=0;i<=n;i++){
      const c=this.coeffs[i];
      const pow=n-i;
      if(c.isZero())continue;
      let term='';
      if(pow===0){term=c.toStr();}
      else{
        const cs=c.abs().eq(F1)?'':c.abs().toStr();
        const xPart=pow===1?'x':`x^${pow}`;
        term=cs+xPart;
      }
      if(parts.length===0){
        if(c.lt(F(0)))parts.push(`-${term}`);
        else parts.push(term);
      }else{
        if(c.lt(F(0)))parts.push(` - ${c.neg().eq(F1)&&pow>0?'':c.neg().toStr()}${pow===0?'':`${pow===1?'x':`x^${pow}`}`}`);
        else parts.push(` + ${term}`);
      }
    }
    return parts.join('');
  }
  static zero(){return new Poly([F(0)]);}
  static one(){return new Poly([F(1)]);}
  add(other){
    const maxDeg=Math.max(this.degree(),other.degree());
    const c=[];
    for(let i=maxDeg;i>=0;i--){
      c.push(this.coeff(i).add(other.coeff(i)));
    }
    return new Poly(c);
  }
  sub(other){
    const maxDeg=Math.max(this.degree(),other.degree());
    const c=[];
    for(let i=maxDeg;i>=0;i--){
      c.push(this.coeff(i).sub(other.coeff(i)));
    }
    return new Poly(c);
  }
  mulPoly(other){
    const n=this.degree(),m=other.degree();
    const c=Array(n+m+1).fill(null).map(()=>F(0));
    for(let i=0;i<=n;i++)for(let j=0;j<=m;j++){
      c[i+j]=c[i+j].add(this.coeffs[i].mul(other.coeffs[j]));
    }
    return new Poly(c);
  }
  scale(k){
    k=Frac.from(k);
    return new Poly(this.coeffs.map(c=>c.mul(k)));
  }
  monicize(){
    return this.scale(F1.div(this.leading()));
  }
}

function polyDiv(dividend, divisor){
  // dividend = divisor * quotient + remainder
  const steps=[];
  let stepIdx=1;
  let rem=new Poly([...dividend.coeffs]);
  const quot=[];
  const qCoeffs=Array(Math.max(0,dividend.degree()-divisor.degree()+1)).fill(F(0));
  
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>被除式：<span style="color:var(--accent)">${dividend.toHTML()}</span>　除式：<span style="color:var(--accent2)">${divisor.toHTML()}</span></span>`,
    ''
  ));
  
  let iter=0;
  while(!rem.isZero()&&rem.degree()>=divisor.degree()){
    const leadQ=rem.leading().div(divisor.leading());
    const powDiff=rem.degree()-divisor.degree();
    // term = leadQ * x^powDiff
    const termCoeffs=Array(powDiff+1).fill(F(0));termCoeffs[0]=leadQ;
    const termPoly=new Poly(termCoeffs);
    
    const sub=divisor.mulPoly(termPoly);
    const newRem=rem.sub(sub);
    
    const termStr=powDiff===0?leadQ.toHTML():
      `${leadQ.eq(F1)?'':leadQ.toHTML()}${powDiff===1?'x':`x<sup>${powDiff}</sup>`}`;
    
    steps.push(step(
      `${makeStepNum(stepIdx++)}<span>商的下一项：${leadQ.toHTML()} × x<sup>${powDiff}</sup> = <span style="color:var(--accent)">${termStr}</span></span>`,
      `<div class="poly-div-display">
         <div class="poly-div-line">被减式：<span class="poly-highlight">${rem.toHTML()}</span></div>
         <div class="poly-div-line">减去：(${termStr}) × (${divisor.toHTML()}) = <span style="color:var(--red)">${sub.toHTML()}</span></div>
         <div>余式：<span style="color:var(--green)">${newRem.toHTML()}</span></div>
       </div>`
    ));
    
    qCoeffs[powDiff]=qCoeffs[powDiff].add(leadQ);
    rem=newRem;
    iter++;
    if(iter>50)break;
  }
  
  const quotPoly=new Poly([...Array.from({length:Math.max(1,dividend.degree()-divisor.degree()+1)},(_,i)=>qCoeffs[dividend.degree()-divisor.degree()-i]||F(0))]);
  
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>最终结果</span>`,
    `<div class="eq-display">
     <div><span style="color:var(--text2)">被除式 = </span><span style="color:var(--accent2)">(${divisor.toHTML()})</span> × <span style="color:var(--accent)">(${quotPoly.toHTML()})</span> + <span style="color:var(--green)">(${rem.toHTML()})</span></div>
     <div style="margin-top:6px"><span style="color:var(--text2)">商：</span><strong style="color:var(--accent)">${quotPoly.toHTML()}</strong></div>
     <div><span style="color:var(--text2)">余式：</span><strong style="color:var(--green)">${rem.toHTML()}</strong></div>
     </div>`
  ));
  return{quotient:quotPoly,remainder:rem,steps};
}

function polyGcd(a,b){
  const steps=[];
  let stepIdx=1;
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>辗转相除：gcd(${a.toHTML()}, ${b.toHTML()})</span>`,
    `<div style="font-size:.82rem;color:var(--text2)">使用欧几里得算法：gcd(f, g) = gcd(g, f mod g)</div>`
  ));
  
  let f=a, g=b;
  let iter=0;
  while(!g.isZero()&&iter<20){
    const {quotient,remainder,steps:dsteps}=polyDiv(f,g);
    steps.push(step(
      `${makeStepNum(stepIdx++)}<span>除法步骤：(${f.toHTML()}) ÷ (${g.toHTML()})</span>`,
      `<div class="eq-display">商 = <span style="color:var(--accent)">${quotient.toHTML()}</span>，余 = <span style="color:var(--green)">${remainder.toHTML()}</span></div>`
    ));
    f=g;
    g=remainder;
    iter++;
  }
  
  // Normalize to monic
  const gcd=f.isZero()?Poly.one():f.monicize();
  steps.push(step(
    `${makeStepNum(stepIdx++)}<span>最大公因式（首一化）</span>`,
    `<div class="eq-display"><strong style="color:var(--green)">gcd = ${gcd.toHTML()}</strong></div>`
  ));
  return{gcd,steps};
}

let activeTool=null;

const toolStateCache={};

// 保存当前工具面板的所有输入状态（含计算结果）
function saveToolState(toolId){
  if(!toolId)return;
  const toolArea=document.getElementById('tool-area');
  if(!toolArea)return;
  const state={inputs:{},selects:{},results:''};
  toolArea.querySelectorAll('input[id]').forEach(el=>{state.inputs[el.id]=el.value;});
  toolArea.querySelectorAll('select[id]').forEach(el=>{state.selects[el.id]=el.value;});
  const resultsEl=document.getElementById('results');
  if(resultsEl)state.results=resultsEl.innerHTML;
  toolStateCache[toolId]=state;
}

// 恢复工具面板的已保存状态
// 正确顺序：① 恢复 select 尺寸 → ② 触发 rebuild 生成正确数量的格子 → ③ 恢复格子数值 → ④ 恢复结果 + 关闭输入法
function restoreToolState(toolId){
  const state=toolStateCache[toolId];
  if(!state)return;

  // ① 恢复 select（尺寸选择器）
  Object.entries(state.selects).forEach(([id,val])=>{
    const el=document.getElementById(id);
    if(el)el.value=val;
  });

  // ② 触发对应工具的 rebuild，使格子数量与 select 一致
  const rebuildMap={
    det:      ()=>rebuildDetInput(),
    inverse:  ()=>rebuildInvInput(),
    rank:     ()=>rebuildRankInput(),
    ref:      ()=>rebuildRefInput(),
    rref:     ()=>rebuildRrefInput(),
    nonhom:   ()=>rebuildNonhomInput(),
    hom:      ()=>rebuildHomInput(),
    matadd:   ()=>rebuildMaddInput(),
    matmul:   ()=>rebuildMmulInput(),
    scalarmul:()=>rebuildSmulInput(),
    eigen:    ()=>rebuildEigenInput(),
    diag:     ()=>rebuildDiagInput(),
    pinvap:   ()=>rebuildPinvInput(),
    trans:    ()=>rebuildTransInput(),
    quadform: ()=>rebuildQfInput(),
    polydiv:  ()=>{rebuildPolyInput('pdiv-f');rebuildPolyInput('pdiv-g');},
    polygcd:  ()=>{rebuildPolyInput('pgcd-f');rebuildPolyInput('pgcd-g');},
  };
  if(rebuildMap[toolId])rebuildMap[toolId]();

  // ③ 恢复所有输入格子的数值
  Object.entries(state.inputs).forEach(([id,val])=>{
    const el=document.getElementById(id);
    if(el)el.value=val;
  });

  // ④ 恢复计算结果 + 确保输入法（numpad）关闭
  const resultsEl=document.getElementById('results');
  if(resultsEl&&state.results)resultsEl.innerHTML=state.results;
  hideNumpad();
}

function showTool(toolId){
  if(location.hash!=='#'+toolId){
    location.hash=toolId;
  } else {
    renderTool(toolId);
  }
  scrollToTop2();
}

function renderTool(toolId){
  // 在销毁面板前保存当前工具状态
  saveToolState(activeTool);

  activeTool=toolId;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tool-btn').forEach(b=>{
    if(b.getAttribute('onclick')===`showTool('${toolId}')`)b.classList.add('active');
  });
  document.getElementById('hub-sidebar-btn').classList.remove('active');
  document.getElementById('history-sidebar-btn').classList.remove('active');
  document.getElementById('welcome').style.display='none';
  const toolArea=document.getElementById('tool-area');
  toolArea.style.display='block';
  toolArea.innerHTML=buildToolPanel(toolId);
  // 恢复该工具的已保存状态（若有，含结果和numpad关闭）
  restoreToolState(toolId);
  setupNumpadListeners();
  closeSidebar();
  document.getElementById('main').scrollTop=0;
}

function buildToolPanel(id){
  const panels={

    rref:buildRrefPanel,
    nonhom:buildNonhomPanel,

function matrixInputHTML(id,rows,cols,label='',isAug=false){

  html+=`<div class="matrix-input-wrap"><table class="matrix-input-table"><tbody>`;

    for(let j=0;j<(isAug?cols+1:cols);j++){

      html+=`<td><input type="text" class="mat-cell" id="${id}_${idxStr}" 
        inputmode="none" autocomplete="off" value="0"

    }
    html+='</tr>';
  }
  html+='</tbody></table></div>';
  html+='</div>';
  return html;
}
